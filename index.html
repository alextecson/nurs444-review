<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Blue – NURS 444</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;display:flex;justify-content:center;padding:0}
#app{width:100%;max-width:640px;position:relative}

/* HOME */
.home{padding:20px 16px 48px}
.home-header{text-align:center;padding:16px 0 20px}
.app-logo{font-size:42px}
.app-title{font-size:1.6rem;font-weight:900;color:#ef4444}
.app-sub{font-size:.8rem;color:#8b949e;margin-top:2px}
.level-card{background:#161b22;border:1px solid #21262d;border-radius:16px;padding:18px;margin-bottom:14px}
.level-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.level-badge{display:flex;align-items:center;gap:8px;font-weight:700;font-size:1rem}
.xp-lbl{font-size:.78rem;color:#8b949e}
.xp-bg{background:#21262d;border-radius:99px;height:10px;overflow:hidden}
.xp-fill{height:10px;border-radius:99px;background:linear-gradient(90deg,#22c55e,#86efac);transition:width .6s ease}
.streak-card{background:linear-gradient(135deg,#1a0f00,#2d1800);border:1px solid #f97316;border-radius:16px;padding:18px;margin-bottom:14px;text-align:center}
.streak-num{font-size:2.8rem;font-weight:900;color:#f97316;line-height:1}
.streak-lbl{font-size:.85rem;color:#fdba74;margin-top:4px}
.streak-sub{font-size:.73rem;color:#8b949e;margin-top:2px}
.btn-start{width:100%;background:linear-gradient(135deg,#22c55e,#15803d);border:none;color:#fff;padding:18px;border-radius:14px;font-size:1.1rem;font-weight:800;cursor:pointer;margin-bottom:14px;box-shadow:0 4px 20px rgba(34,197,94,.3);transition:transform .15s,opacity .15s}
.btn-start:hover{transform:translateY(-2px);opacity:.92}
.sec-title{font-size:.72rem;color:#8b949e;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;font-weight:600}
.focus-card{background:#161b22;border:1px solid #21262d;border-radius:12px;padding:14px;margin-bottom:14px}
.fi{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #21262d}
.fi:last-child{border-bottom:none}
.fi-name{font-size:.86rem;color:#c9d1d9}
.fi-right{display:flex;align-items:center;gap:7px}
.fi-pct{font-size:.73rem;color:#ef4444;font-weight:700;min-width:36px;text-align:right}
.fi-bar-bg{width:54px;background:#21262d;border-radius:99px;height:5px;overflow:hidden}
.fi-bar{height:5px;border-radius:99px;background:#ef4444}
.badges-card{background:#161b22;border:1px solid #21262d;border-radius:12px;padding:14px;margin-bottom:14px}
.badges-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
.bp{background:#21262d;border:1px solid #30363d;border-radius:8px;padding:5px 9px;font-size:.78rem;display:flex;align-items:center;gap:5px;color:#8b949e}
.bp.earned{border-color:#f59e0b;background:#2d1f00;color:#fbbf24}

/* SESSION */
.session{display:flex;flex-direction:column;min-height:100vh}
.hud{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px;background:#0d1117;border-bottom:1px solid #21262d;position:sticky;top:0;z-index:10}
.hearts{display:flex;gap:4px;font-size:1.2rem}
.heart{transition:all .3s}
.heart.lost{filter:grayscale(1);opacity:.3;transform:scale(.8)}
.dots{display:flex;gap:3px}
.dot{width:20px;height:7px;border-radius:99px;background:#21262d;transition:background .25s}
.dot.done{background:#22c55e}
.dot.cur{background:#58a6ff}
.hud-xp{font-size:.82rem;color:#58a6ff;font-weight:700}
.qwrap{padding:18px 16px}
.q-tag{display:inline-block;background:#21262d;color:#58a6ff;border-radius:6px;padding:3px 10px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.q-typetag{display:inline-block;background:#21262d;color:#8b949e;border-radius:6px;padding:3px 8px;font-size:.7rem;margin-bottom:10px;margin-left:5px}
.q-stem{font-size:1.02rem;line-height:1.65;color:#e6edf3;font-weight:500;margin-bottom:18px}
.sata-note{color:#f97316;font-size:.76rem;font-weight:600;margin-bottom:12px;background:#2d1a00;border:1px solid #f97316;border-radius:8px;padding:7px 11px}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{background:#161b22;border:2px solid #21262d;border-radius:12px;padding:13px 15px;cursor:pointer;display:flex;align-items:flex-start;gap:11px;font-size:.92rem;line-height:1.5;color:#c9d1d9;text-align:left;width:100%;transition:border-color .12s,background .12s}
.opt:hover:not([disabled]){border-color:#58a6ff;background:#0a1829;color:#e6edf3}
.opt.sel{border-color:#58a6ff;background:#0a1829}
.opt.sel .ol{background:#1f6feb;color:#fff}
.opt.correct{border-color:#22c55e!important;background:#071a0e!important}
.opt.correct .ol{background:#22c55e!important;color:#fff!important}
.opt.wrong{border-color:#ef4444!important;background:#1a0707!important}
.opt.wrong .ol{background:#ef4444!important;color:#fff!important}
.opt.missed{border-color:#22c55e!important;border-style:dashed!important}
.ol{background:#21262d;border-radius:6px;min-width:27px;height:27px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.76rem;color:#8b949e;flex-shrink:0}
.sub-wrap{padding:14px 16px;text-align:center}
.btn-sub{background:#1f6feb;border:none;color:#fff;padding:12px 36px;border-radius:10px;font-size:.92rem;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn-sub:disabled{opacity:.35;cursor:not-allowed}

/* FEEDBACK */
.fb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:99}
.fb{margin-top:20px;border-radius:14px;padding:20px;animation:fbIn .25s ease}
.fb.ok{background:#071a0e;border:2px solid #22c55e}
.fb.err{background:#1a0707;border:2px solid #ef4444}
.fb-head{font-size:1.15rem;font-weight:800;margin-bottom:7px}
.fb.ok .fb-head{color:#22c55e}
.fb.err .fb-head{color:#ef4444}
.fb-correct{font-size:.8rem;color:#f87171;font-weight:600;margin-bottom:8px}
.fb-body{font-size:.86rem;line-height:1.6;color:#c9d1d9;margin-bottom:14px}
.fb-xp{font-size:.8rem;color:#58a6ff;font-weight:700;margin-bottom:12px}
.btn-cont{width:100%;padding:14px;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer}
.fb.ok .btn-cont{background:#22c55e;color:#fff}
.fb.err .btn-cont{background:#ef4444;color:#fff}

/* RESULTS */
.results{padding:22px 16px 40px;text-align:center}
.res-icon{font-size:60px;margin-bottom:10px;animation:bounce .5s ease}
.res-title{font-size:1.5rem;font-weight:900;margin-bottom:4px}
.res-sub{color:#8b949e;font-size:.88rem;margin-bottom:20px;line-height:1.5}
.xp-big{font-size:2.4rem;font-weight:900;color:#22c55e}
.xp-big-lbl{font-size:.82rem;color:#8b949e;margin-bottom:20px}
.stats-row{display:flex;gap:10px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.sbox{background:#161b22;border:1px solid #21262d;border-radius:12px;padding:14px 20px;text-align:center}
.sn{font-size:1.5rem;font-weight:800;color:#58a6ff}
.sl{font-size:.7rem;color:#8b949e;margin-top:2px}
.new-bdg{margin-bottom:18px}
.bdg-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:8px}
.bdg-pill{background:#2d1f00;border:1px solid #f59e0b;border-radius:10px;padding:9px 13px;font-size:.83rem;color:#fbbf24;display:flex;align-items:center;gap:5px}
.breakdown{background:#161b22;border:1px solid #21262d;border-radius:12px;padding:14px;margin-bottom:20px;text-align:left}
.bdi{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #21262d;font-size:.86rem}
.bdi:last-child{border-bottom:none}
.bdi-name{color:#c9d1d9}
.bdi-ok{color:#22c55e;font-weight:700}
.bdi-err{color:#ef4444;font-weight:700}
.res-btns{display:flex;flex-direction:column;gap:10px}
.btn-again{background:linear-gradient(135deg,#22c55e,#15803d);border:none;color:#fff;padding:16px;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;box-shadow:0 4px 18px rgba(34,197,94,.3)}
.btn-home{background:#21262d;border:1px solid #30363d;color:#e6edf3;padding:14px;border-radius:12px;font-size:.93rem;font-weight:600;cursor:pointer}

/* GAME OVER */
.gameover{padding:24px 16px;text-align:center;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.go-icon{font-size:68px;margin-bottom:14px}
.go-title{font-size:1.5rem;font-weight:900;color:#ef4444;margin-bottom:8px}
.go-sub{color:#8b949e;font-size:.9rem;margin-bottom:30px;line-height:1.6}
.btn-retry{background:linear-gradient(135deg,#ef4444,#f97316);border:none;color:#fff;padding:16px 48px;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;margin-bottom:12px;display:block;width:100%;max-width:280px}
.btn-go-home{background:#21262d;border:1px solid #30363d;color:#e6edf3;padding:13px 40px;border-radius:12px;font-size:.92rem;font-weight:600;cursor:pointer;width:100%;max-width:280px}

@keyframes fbIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
.shake{animation:shake .3s ease}
@media(max-width:480px){.q-stem{font-size:.96rem}.app-title{font-size:1.4rem}}
</style>
</head>
<body>
<div id="app"><div style="text-align:center;padding:60px 20px;color:#8b949e">🚨<br><br>Loading...</div></div>
<script>
// ── QUESTION BANK ─────────────────────────────────────────────────────────────
// CRITICAL: c[] contains EXACT TEXT of correct options (matched by text, not index)
// This prevents any shuffling bugs — correct answers are always found by text match
const QB=[
{group:"Chest Tubes",qs:[
{s:"12 hours post-left lobectomy, the nurse suspects an air leak. Which chamber should show continuous bubbling to confirm?",o:["Collection chamber","Water-seal chamber","Suction control chamber","Suction regulator port"],c:["Water-seal chamber"],r:"Continuous bubbling in the water-seal (middle) chamber = air leak. Collection chamber stores drainage. Intermittent suction chamber bubbling is normal. Tidaling with respirations is expected."},
{s:"Post-thoracotomy, the nurse notes continuous bubbling in one chamber. Which chamber indicates an air leak?",o:["Suction control chamber","Drainage collection chamber","Water-seal chamber","Connector site"],c:["Water-seal chamber"],r:"Air leaks are confirmed by continuous bubbling in the water-seal chamber. Tidaling is normal. Intermittent bubbling in the suction chamber is expected when suction is applied."},
{s:"After a right upper lobectomy, the nurse finds steady bubbling that does NOT change with breathing. This finding in which chamber indicates a persistent air leak?",o:["Wet suction chamber","Drainage collection cylinder","Water-seal chamber","Suction tubing junction"],c:["Water-seal chamber"],r:"Constant bubbling in the water-seal chamber = air leak (lung or system). Tidaling is normal. Suction chamber bubbling is expected when suction is active."}
]},
{group:"CVI Management",qs:[
{s:"A client with CVI and venous stasis ulcer is being discharged. Which teaching point is INCORRECT?",o:["Apply compression stockings before rising","Elevate legs above heart level daily","Keep legs dependent when sitting to improve circulation","Walk daily and do ankle-pump exercises"],c:["Keep legs dependent when sitting to improve circulation"],r:"Dependent positioning increases venous pooling and worsens edema in CVI. Elevation is essential. Compression, elevation, and walking are all correct CVI interventions."},
{s:"Which instruction is most important for a client with venous stasis ulcers?",o:["Avoid walking to protect the ulcer","Wear compression stockings and elevate legs as directed","Apply a heating pad to improve circulation","Keep the ulcer dry and uncovered"],c:["Wear compression stockings and elevate legs as directed"],r:"Compression therapy and leg elevation are the cornerstones of CVI management. Walking is encouraged (calf muscle pump). Heating pads risk burns. Venous ulcers need moist wound care."},
{s:"Which client statement about CVI management indicates a need for further teaching?",o:["I put my stockings on before I get out of bed","I prop my feet above my heart a few times a day","I sit with my feet flat on the floor when watching TV","I walk around the neighborhood every morning"],c:["I sit with my feet flat on the floor when watching TV"],r:"Keeping legs dependent increases venous pooling and worsens CVI edema. Clients should elevate legs whenever possible, not leave them in a dependent position."}
]},
{group:"TB Discharge Criteria",qs:[
{s:"A hospitalized client with pulmonary TB is improving on multi-drug therapy. Which discharge statement is most accurate?",o:["Stay until three consecutive sputum smears are negative","Discharge is appropriate with DOT arranged, public health follow-up, and no high-risk household contacts","One negative NAAT test clears the client for any facility","A negative PPD indicates readiness for discharge"],c:["Discharge is appropriate with DOT arranged, public health follow-up, and no high-risk household contacts"],r:"Safe TB discharge requires DOT arrangement, a public health monitoring plan, and no vulnerable household members. PPD does not become negative after treatment."},
{s:"Which factor makes home discharge INAPPROPRIATE for a client with active pulmonary TB?",o:["Client is tolerating medications without GI side effects","An immunocompromised family member lives in the home","Client has had two weeks of four-drug therapy","Chest x-ray shows improvement"],c:["An immunocompromised family member lives in the home"],r:"An immunocompromised household member is a contraindication to TB home discharge regardless of mask use. Transmission risk remains significant."},
{s:"Which statement about TB discharge requires correction?",o:["DOT must be arranged before discharge","Home discharge is safe with an immunocompromised household member as long as the client wears a mask","Public health follow-up is required","High-risk household contacts are a barrier to home discharge"],c:["Home discharge is safe with an immunocompromised household member as long as the client wears a mask"],r:"An immunocompromised household member is a contraindication to TB home discharge regardless of mask use."}
]},
{group:"Asthma Exacerbation",qs:[
{s:"A client with moderate persistent asthma has peak flow 60% of personal best, nocturnal awakenings, and SpO₂ 94%. Most appropriate action?",o:["Increase inhaled corticosteroid for immediate relief","Administer a SABA and reassess peak flow in 15–20 minutes","Send to the emergency department immediately","No action needed; reassess in 4 hours"],c:["Administer a SABA and reassess peak flow in 15–20 minutes"],r:"Peak flow 40–79% = yellow zone (moderate). Priority: SABA (albuterol) + reassessment in 15–20 minutes. Inhaled corticosteroids are controller, not rescue, agents."},
{s:"A client's peak flow is 300 L/min (personal best 500 L/min). Which medication should the nurse administer first?",o:["Budesonide (inhaled corticosteroid)","Montelukast (leukotriene antagonist)","Albuterol (SABA)","Salmeterol (LABA)"],c:["Albuterol (SABA)"],r:"Peak flow 60% = yellow zone. Albuterol (SABA) is the first-line rescue agent. Inhaled corticosteroids and LABAs are controller medications, not rescue agents."},
{s:"A client with asthma had nocturnal awakenings twice and peak flow is 65% of personal best. Which zone and priority intervention apply?",o:["Green zone; reinforce controller medication","Yellow zone; SABA and reassess in 15–20 minutes","Red zone; call 911 immediately","Blue zone; begin systemic steroids"],c:["Yellow zone; SABA and reassess in 15–20 minutes"],r:"40–79% of personal best = yellow zone (caution). Priority: SABA + peak flow reassessment in 15–20 minutes. Red zone (<40%) = emergency."}
]},
{group:"PEEP & Hemodynamics",qs:[
{s:"ARDS patient has PEEP increased to 14 cm H₂O. BP drops to 86/50 and vasopressor requirements escalate. Most likely cause?",o:["Improved alveolar recruitment increased venous return","Decreased preload from elevated intrathoracic pressure","Acute metabolic alkalosis from over-ventilation","Increased cardiac contractility from better oxygenation"],c:["Decreased preload from elevated intrathoracic pressure"],r:"High PEEP increases intrathoracic pressure → compresses right heart → reduces venous return (preload) → decreased cardiac output → hypotension. Classic PEEP hemodynamic complication."},
{s:"An ARDS patient is on PEEP 12 cm H₂O. Which finding is the strongest indicator that PEEP may need to be REDUCED?",o:["PaO₂ 55 mmHg and SaO₂ 88%","Blood pressure 84/46 mmHg","Bilateral bronchial breath sounds","First-degree AV block at rate 58"],c:["Blood pressure 84/46 mmHg"],r:"Hypotension signals that PEEP is impairing venous return and reducing cardiac output → may need to reduce PEEP. Low PaO₂/SaO₂ would suggest the need to INCREASE PEEP."},
{s:"After increasing PEEP from 10 to 16 cm H₂O, which finding represents an adverse hemodynamic effect?",o:["Increased urine output from improved renal perfusion","Rising CVP with concurrent hypotension","Warm extremities and bounding peripheral pulses","Decreasing heart rate from improved cardiac output"],c:["Rising CVP with concurrent hypotension"],r:"High PEEP reduces venous return → CVP may rise paradoxically (backpressure) while BP falls due to decreased cardiac output. This is the key hemodynamic side effect of high PEEP."}
]},
{group:"Heart Failure Teaching",qs:[
{s:"Which statement by a newly diagnosed heart failure client indicates effective teaching?",o:["I'll call if I gain more than 2–3 lbs in a day or 5 lbs in a week","I'll use my nitroglycerin patch when I feel short of breath","I take furosemide at bedtime to avoid daytime bathroom trips","An extra pillow fixes my nighttime shortness of breath"],c:["I'll call if I gain more than 2–3 lbs in a day or 5 lbs in a week"],r:"Rapid weight gain signals fluid retention → call provider. Nitro is for angina, not dyspnea. Furosemide at bedtime causes nocturia. Extra pillows manage symptoms but don't treat the problem."},
{s:"Which HF weight monitoring instruction is correct?",o:["Weigh weekly at the same time","Report a weight gain of ≥2 pounds in one day to your provider","Weigh after meals for the most accurate reading","Weight gain of up to 5 lbs daily is expected"],c:["Report a weight gain of ≥2 pounds in one day to your provider"],r:"HF clients should weigh daily (morning, before eating, after voiding) and report ≥2 lbs/day or ≥5 lbs/week — signals of fluid overload requiring medication adjustment."},
{s:"A 72-year-old HF client calls reporting a 4-lb weight gain since yesterday morning. How should the nurse triage?",o:["Normal daily fluctuation; recheck tomorrow","Urgent provider notification — acute fluid retention","Restrict fluids and call back in 3 days","Take an extra furosemide dose independently"],c:["Urgent provider notification — acute fluid retention"],r:"4 lbs in 24 hours = acute decompensation red flag. Urgent provider contact required. Self-medicating with additional diuretics without direction is unsafe."}
]},
{group:"Palliative vs Hospice",qs:[
{s:"A client with metastatic lung cancer on chemotherapy reports unmanageable pain and fatigue. Most appropriate referral?",o:["Hospice care","Palliative care","Home health services only","No referral until chemotherapy stops"],c:["Palliative care"],r:"Palliative care can be provided alongside disease-directed therapy at any stage. Hospice requires stopping curative treatment and a prognosis ≤6 months."},
{s:"A client with stage IV cancer on immunotherapy has severe pain and anxiety. Which service best addresses symptoms while continuing treatment?",o:["Hospice, because prognosis is poor","Palliative care, concurrent with ongoing treatment","Home health for IV medication only","Psychiatry consult exclusively"],c:["Palliative care, concurrent with ongoing treatment"],r:"Palliative care is appropriate at any illness stage alongside any treatment. Hospice requires ≤6-month prognosis AND stopping curative treatment."},
{s:"Which statement best distinguishes palliative care from hospice?",o:["Palliative care requires a ≤6-month prognosis","Hospice can be provided during active chemotherapy","Palliative care addresses comfort and quality of life at any disease stage regardless of treatment status","Hospice and palliative care are interchangeable terms"],c:["Palliative care addresses comfort and quality of life at any disease stage regardless of treatment status"],r:"Palliative care = comfort at ANY stage with ANY treatment. Hospice = comfort only, no curative treatment, prognosis ≤6 months."}
]},
{group:"Silent Chest – Status Asthmaticus",qs:[
{s:"A status asthmaticus client who was loudly wheezing now has absent bilateral breath sounds and a dropping SpO₂. What does this indicate?",o:["Bronchospasm is resolving — improvement","Silent chest: critical deterioration requiring immediate intervention","Pneumonia has developed","The bronchodilator is working"],c:["Silent chest: critical deterioration requiring immediate intervention"],r:"Silent chest in status asthmaticus = airways so severely obstructed that no air moves in or out. This is pre-respiratory arrest. Immediate intervention required — not reassurance."},
{s:"Which finding in status asthmaticus is the MOST ominous and requires the most urgent action?",o:["Expiratory wheezing with prolonged I:E ratio","Accessory muscle use with RR 28","Silent chest with decreasing SpO₂","Tachycardia at HR 108 after albuterol"],c:["Silent chest with decreasing SpO₂"],r:"Silent chest = no audible air movement = critical airway obstruction and impending respiratory arrest. Tachycardia after albuterol is a common expected side effect."},
{s:"An asthmatic client who was wheezing on arrival is now quiet, less responsive, with faint breath sounds. Priority action?",o:["Document that wheezing resolved","Immediately notify provider — critical airflow obstruction","Give another bronchodilator treatment and wait 15 minutes","Reduce oxygen flow to prevent hyperoxia"],c:["Immediately notify provider — critical airflow obstruction"],r:"Disappearance of wheezing + decreasing mentation = silent chest = deterioration, NOT improvement. Notify the provider immediately and prepare for intubation."}
]},
{group:"COPD & Hypoxic Drive",qs:[
{s:"An end-stage COPD patient with chronic hypercapnia is on 100% O₂ via NRB mask. ABG: pH 7.32, PaCO₂ 68, PaO₂ 54. What complication may result from high-flow oxygen?",o:["Increased respiratory drive and improved gas exchange","Respiratory depression from suppression of the hypoxic drive","Respiratory alkalosis from excessive CO₂ elimination","Improved oxygenation without CO₂ effect"],c:["Respiratory depression from suppression of the hypoxic drive"],r:"Chronic CO₂ retainers rely on low PaO₂ (hypoxic drive) as their primary respiratory stimulus. High-flow O₂ eliminates this drive → respiratory depression. Target SpO₂: 88–92%."},
{s:"When caring for a COPD patient who chronically retains CO₂, which SpO₂ range should the nurse target?",o:["94–98%","88–92%","98–100%","85–88%"],c:["88–92%"],r:"Target SpO₂ 88–92% in COPD with chronic hypercapnia. Higher levels risk suppressing the hypoxic respiratory drive, causing CO₂ narcosis and respiratory failure."},
{s:"A COPD patient with CO₂ retention is receiving high-flow oxygen. The nurse's priority concern is:",o:["Oxygen toxicity causing lung damage within hours","Suppression of hypoxic drive leading to CO₂ narcosis","Increased mucus production worsening secretions","Barotrauma from increased airway pressure"],c:["Suppression of hypoxic drive leading to CO₂ narcosis"],r:"In chronic CO₂ retainers, the hypoxic drive may be the primary breathing stimulus. Overcorrecting hypoxemia with high-flow O₂ can suppress this drive → respiratory depression."}
]},
{group:"BiPAP Failure",qs:[
{s:"A COPD patient on BiPAP becomes difficult to arouse. ABG: pH 7.21, PaCO₂ 72, PaO₂ 88 on 40% FiO₂. Priority action?",o:["Increase FiO₂ to 100% and reassess in 30 min","Administer a benzodiazepine for agitation","Notify provider and prepare for intubation","Continue BiPAP and get a chest x-ray"],c:["Notify provider and prepare for intubation"],r:"BiPAP has failed: pH 7.21 + rising CO₂ + worsening consciousness = impending respiratory arrest. Increasing FiO₂ worsens CO₂ retention. Benzodiazepines suppress respirations further. Urgent intubation required."},
{s:"A COPD patient on BiPAP for 2 hours shows increasing somnolence. ABG: pH 7.18, PaCO₂ 80. Most appropriate response?",o:["Increase BiPAP pressure and reassess in 1 hour","Administer naloxone to reverse respiratory depression","Activate rapid response and anticipate emergent intubation","Place patient prone to improve oxygenation"],c:["Activate rapid response and anticipate emergent intubation"],r:"Worsening pH (7.18) + rising CO₂ + altered mental status on BiPAP = therapy failure + impending arrest. Naloxone is for opioid reversal. Prone is used in ARDS, not COPD."},
{s:"Which finding in a COPD patient on BiPAP requires IMMEDIATE provider notification for escalation of care?",o:["RR decreasing from 32 to 22 breaths per minute","Patient reports the mask is uncomfortable","Increasing drowsiness with pH 7.20 and PaCO₂ 78","SpO₂ improving from 87% to 92%"],c:["Increasing drowsiness with pH 7.20 and PaCO₂ 78"],r:"Worsening pH + rising CO₂ + increasing drowsiness on BiPAP = therapy failure → urgent escalation. Improving RR and SpO₂ indicate BiPAP is working — no escalation needed."}
]},
{group:"ABG Interpretation",qs:[
{s:"COPD patient ABG: pH 7.28, PaCO₂ 68, PaO₂ 84 on 40% FiO₂, HCO₃ 30. Which best describes this condition?",o:["Metabolic acidosis without respiratory involvement","Acute hypercapnic (Type 2) respiratory failure","Pure hypoxemic (Type 1) respiratory failure","Metabolic alkalosis with respiratory compensation"],c:["Acute hypercapnic (Type 2) respiratory failure"],r:"Low pH + elevated PaCO₂ = respiratory acidosis. Elevated HCO₃ = chronic metabolic compensation. Combined = acute-on-chronic hypercapnic (Type 2) respiratory failure."},

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;}

function getLevel(xp){
  let l=0;
  for(let i=0;i<LEVELS.length-1;i++){if(xp<LEVELS[i].next){break;}l=i+1;}
  return Math.min(l,LEVELS.length-1);
}

function getLevelProg(xp){
  const l=getLevel(xp);
  const base=l>0?LEVELS[l-1].next:0;
  const next=LEVELS[l].next;
  if(next===Infinity)return{pct:100,label:'MAX LEVEL'};
  const pct=Math.min(100,((xp-base)/(next-base))*100);
  return{pct,label:`${xp} / ${next} XP`};
}

// ── BUILD SESSION with weighted topic selection ────────────────────────────────
function buildSession(){
  const weighted=QB.map(g=>{
    const ts=DATA.topicScores[g.group]||{c:0,w:0};
    const tot=ts.c+ts.w;
    const wr=tot>0?ts.w/tot:0;
    return{g,weight:1+wr*3};
  });
  const selected=[], pool=[...weighted];
  const n=Math.min(SESSION_LEN,QB.length);
  for(let i=0;i<n;i++){
    const totalW=pool.reduce((s,x)=>s+x.weight,0);
    let r=Math.random()*totalW;
    for(let j=0;j<pool.length;j++){r-=pool[j].weight;if(r<=0){selected.push(pool[j].g);pool.splice(j,1);break;}}
  }
  // Shuffle question ORDER so sequence is never predictable across restarts
  shuffle(selected);
  if(!DATA.seenVariants)DATA.seenVariants={};
  return selected.map(grp=>{
    // Variant rotation: never show the same wording twice in a row
    const lastIdx=DATA.seenVariants[grp.group]??-1;
    const availIdxs=grp.qs.map((_,i)=>i).filter(i=>i!==lastIdx);
    const varIdx=availIdxs.length>0
      ?availIdxs[0|Math.random()*availIdxs.length]
      :0|Math.random()*grp.qs.length;
    DATA.seenVariants[grp.group]=varIdx;
    const raw=grp.qs[varIdx];
    const shuffledOpts=shuffle([...raw.o]);
    const correctTexts=new Set(raw.c);
    const correctIdxs=[];
    shuffledOpts.forEach((txt,i)=>{if(correctTexts.has(txt))correctIdxs.push(i);});
    return{group:grp.group,stem:raw.s,opts:shuffledOpts,correctIdxs,
           rationale:raw.r,isSATA:!!(raw.type==='sata'||raw.c.length>1)};
  });
}

function getWeakTopics(n){
  return Object.entries(DATA.topicScores)
    .filter(([,v])=>v.c+v.w>0)
    .map(([k,v])=>({group:k,wr:v.w/(v.c+v.w)}))
    .sort((a,b)=>b.wr-a.wr).slice(0,n);
}

function updateStreak(){
  const today=new Date().toDateString();
  const yesterday=new Date(Date.now()-86400000).toDateString();
  if(DATA.lastPlayed===today)return;
  DATA.streak=(DATA.lastPlayed===yesterday)?DATA.streak+1:1;
  DATA.lastPlayed=today;
}

function checkBadges(sessionCorrect,sessionTotal,newXP){
  const has=b=>DATA.badges.includes(b);
  const newB=[];
  // Only award level-progression badges that actually exist in BADGES
  const lvlBadge=LVL_BADGES[getLevel(newXP)];
  if(lvlBadge&&BADGES[lvlBadge]&&!has(lvlBadge))newB.push(lvlBadge);
  newB.forEach(b=>{if(!DATA.badges.includes(b))DATA.badges.push(b);});
  return newB;
}

    <div class="level-card">
      <div class="level-row">
        <div class="level-badge">${L.icon} ${L.name}</div>
        <span class="xp-lbl">${prog.label}</span>
      </div>
      <div class="xp-bg"><div class="xp-fill" style="width:${prog.pct}%"></div></div>
    </div>
    <div class="streak-card">
      <div class="streak-num">🔥 ${DATA.streak}</div>
      <div class="streak-lbl">${DATA.streak===1?'Day Streak':'Day Streak'}</div>
      <div class="streak-sub">${DATA.streak===0?'Start your streak today!':DATA.streak>=7?'Absolutely unstoppable 💥':DATA.streak>=3?'Keep the fire going! 🔥':'Great start — come back tomorrow!'}</div>
    </div>
    <button class="btn-start" onclick="startSession()">▶ &nbsp;START SESSION &nbsp;(${SESSION_LEN} Questions · ${MAX_HEARTS} Lives)</button>
    ${weak.length?`<div class="focus-card">
      <div class="sec-title">🎯 Focus Areas — Needs Work</div>
      ${weak.map(w=>`<div class="fi">
        <span class="fi-name">${w.group}</span>
        <div class="fi-right">
          <span class="fi-pct">${Math.round(w.wr*100)}% ✗</span>
          <div class="fi-bar-bg"><div class="fi-bar" style="width:${Math.round(w.wr*100)}%"></div></div>
        </div>
      </div>`).join('')}
    </div>`:''}
    <div class="badges-card">
      <div class="sec-title">🏅 Badges (${DATA.badges.length}/${allB.length})</div>
      <div class="badges-row">
        ${allB.map(id=>{const b=BADGES[id];const e=DATA.badges.includes(id);
          return`<div class="bp ${e?'earned':''}" title="${b.desc}">${b.icon} ${b.name}</div>`;}).join('')}
      </div>
    </div>
  </div>`;
}

function startSession(){
  G={qs:buildSession(),qi:0,hearts:MAX_HEARTS,xpEarned:0,correct:0,sel:[],answered:false,results:[]};
  showQ();
}

function showQ(){
  const q=G.qs[G.qi];
  G.sel=[];G.answered=false;
  const L='ABCDE';
  app().innerHTML=`<div class="session">
    <div class="hud">
      <div class="hearts">${Array.from({length:MAX_HEARTS},(_,i)=>`<span class="heart${i>=G.hearts?' lost':''}" id="h${i}">${i<G.hearts?'❤️':'🖤'}</span>`).join('')}</div>
      <div class="dots">${G.qs.map((_,i)=>`<div class="dot${i<G.qi?' done':i===G.qi?' cur':''}"></div>`).join('')}</div>
      <div class="hud-xp">+${G.xpEarned} XP</div>
    </div>
    <div class="qwrap">
      <span class="q-tag">${q.group}</span>
      <span class="q-typetag">${q.isSATA?'Select All That Apply':'Multiple Choice'}</span>
      <div class="q-stem">${q.stem}</div>
      ${q.isSATA?'<div class="sata-note">⚠️ Select ALL correct answers, then tap Submit</div>':''}
      <div class="opts">
        ${q.opts.map((o,i)=>`<button class="opt" id="o${i}" onclick="pick(${i})">
          <span class="ol">${L[i]}</span><span>${o}</span>
        </button>`).join('')}
      </div>
      ${q.isSATA?`<div class="sub-wrap"><button class="btn-sub" id="sub" onclick="submitSATA()" disabled>Submit Answer</button></div>`:''}
    </div>
  </div>`;
}

function pick(i){
  if(G.answered)return;
  const q=G.qs[G.qi];
  if(!q.isSATA){G.sel=[i];grade([i]);}
  else{
    const idx=G.sel.indexOf(i);
    if(idx===-1)G.sel.push(i);else G.sel.splice(idx,1);
    const el=$('o'+i);if(el)el.classList.toggle('sel',G.sel.includes(i));
    const sub=$('sub');if(sub)sub.disabled=G.sel.length===0;
  }
}
function submitSATA(){if(!G.answered&&G.sel.length>0)grade([...G.sel]);}

function grade(chosen){
  if(G.answered)return;
  G.answered=true;
  const q=G.qs[G.qi];
  const corr=q.correctIdxs;
  const ok=chosen.length===corr.length&&corr.every(c=>chosen.includes(c));

  q.opts.forEach((_,i)=>{
    const el=$('o'+i);if(!el)return;
    el.disabled=true;
    if(corr.includes(i))el.classList.add('correct');
    else if(chosen.includes(i))el.classList.add('wrong');
  });
  const sub=$('sub');if(sub)sub.disabled=true;

  if(!DATA.topicScores[q.group])DATA.topicScores[q.group]={c:0,w:0};
  if(ok){DATA.topicScores[q.group].c++;G.correct++;G.xpEarned+=XP_CORRECT;}
  else{DATA.topicScores[q.group].w++;G.hearts--;loseHeart();}

  G.results.push({group:q.group,correct:ok});

  const correctAnswerText=corr.map(i=>q.opts[i]).join(' & ');
  const isLast=G.qi+1>=SESSION_LEN;
  const fb=document.createElement('div');
  fb.className=`fb ${ok?'ok':'err'}`;
  fb.innerHTML=`
    <div class="fb-head">${ok?'✅ Correct!':'❌ Incorrect'}</div>
    ${!ok?`<div class="fb-correct">Correct answer: ${correctAnswerText}</div>`:''}
    <div class="fb-body">${q.rationale}</div>
    ${ok?`<div class="fb-xp">+${XP_CORRECT} XP</div>`:''}
    <button class="btn-cont" id="contBtn">${G.hearts===0?'See Results →':isLast?'Finish Session →':'Continue →'}</button>`;
  const wrap=document.querySelector('.qwrap');
  if(wrap)wrap.appendChild(fb);else document.body.appendChild(fb);
  const cb=document.getElementById('contBtn');
  if(cb)cb.onclick=next;
  fb.scrollIntoView({behavior:'smooth',block:'center'});
}

function loseHeart(){
  const lost=MAX_HEARTS-G.hearts;
  const el=$('h'+(lost-1));
  if(el){el.textContent='🖤';el.classList.add('lost','shake');}
}

function next(){
  document.querySelectorAll('.fb-overlay,.fb').forEach(e=>e.remove());
  if(G.hearts===0){showGameOver();return;}
  G.qi++;
  if(G.qi>=SESSION_LEN)endSession();
  else showQ();
}

function endSession(){
  updateStreak();
  const oldLv=getLevel(DATA.xp);
  DATA.xp+=G.xpEarned;
  DATA.totalSessions++;
  G.newBadges=checkBadges(G.correct,SESSION_LEN,DATA.xp);
  Store.save(DATA);
  showResults(oldLv);
}

function showResults(oldLv){
  const pct=Math.round(G.correct/SESSION_LEN*100);
  const newLv=getLevel(DATA.xp);
  const leveledUp=newLv>oldLv;
  const byG={};
  G.results.forEach(r=>{if(!byG[r.group])byG[r.group]={c:0,w:0};r.correct?byG[r.group].c++:byG[r.group].w++;});

  app().innerHTML=`<div class="results">
    <div class="res-icon">${pct===100?'🏆':pct>=80?'💪':pct>=60?'📚':'🔄'}</div>
    <div class="res-title">${pct===100?'Perfect Session!':pct>=80?'Great Work!':pct>=60?'Keep Studying!':'Don\'t Give Up!'}</div>
    <div class="res-sub">${G.correct}/${SESSION_LEN} correct &nbsp;·&nbsp; ${pct}%${leveledUp?`<br>🎉 Level Up! You're now ${LEVELS[newLv].icon} ${LEVELS[newLv].name}!`:''}</div>
    <div class="xp-big">+${G.xpEarned}</div>
    <div class="xp-big-lbl">XP earned this session &nbsp;·&nbsp; ${DATA.xp} XP total</div>
    <div class="stats-row">
      <div class="sbox"><div class="sn">${G.correct}</div><div class="sl">Correct</div></div>
      <div class="sbox"><div class="sn">${SESSION_LEN-G.correct}</div><div class="sl">Incorrect</div></div>
      <div class="sbox"><div class="sn">🔥${DATA.streak}</div><div class="sl">Day Streak</div></div>
    </div>
    ${G.newBadges.filter(id=>BADGES[id]).length?`<div class="new-bdg">
      <div class="sec-title">🏅 New Badges Earned!</div>
      <div class="bdg-row">${G.newBadges.filter(id=>BADGES[id]).map(id=>`<div class="bdg-pill">${BADGES[id].icon} ${BADGES[id].name}</div>`).join('')}</div>
    </div>`:''}
    <div class="breakdown">
      <div class="sec-title" style="margin-bottom:8px">Session Breakdown</div>
      ${Object.entries(byG).map(([g,v])=>`<div class="bdi">
        <span class="bdi-name">${g}</span>
        <span class="${v.w===0?'bdi-ok':'bdi-err'}">${v.w===0?'✓ Strong':'✗ Review'}</span>
      </div>`).join('')}
    </div>
    <div class="res-btns">
      <button class="btn-again" onclick="startSession()">▶ Play Again</button>
      <button class="btn-home" onclick="showHome()">🏠 Home</button>
    </div>
  </div>`;
}

function showGameOver(){
  Store.save(DATA);
  app().innerHTML=`<div class="gameover">
    <div class="go-icon">💔</div>
    <div class="go-title">Out of Hearts</div>
    <div class="go-sub">You ran out of lives with ${SESSION_LEN-G.qi} question${SESSION_LEN-G.qi!==1?'s':''} remaining.<br><br>Review your weak areas on the home screen and try again. You've got this.</div>
    <button class="btn-retry" onclick="startSession()">Try Again</button>
    <br style="margin:8px 0">
    <button class="btn-go-home" onclick="showHome()">🏠 Home</button>
  </div>`;
}

// ── INIT ───────────────────────────────────────────────────────────────────────
async function init(){DATA=await Store.load();showHome();}
init();
</script>
</body>
</html>
