{s:"A client with end-stage HF and a signed DNR/POLST (comfort-only) is severely dyspneic and anxious despite oxygen. Family says, 'Do everything to keep him alive.' Most appropriate action?",o:["Increase oxygen flow and prepare for ICU transfer","Administer morphine as prescribed to relieve dyspnea and anxiety","Encourage the family to reconsider comfort-only goals","Request an ethics consult to override the client's wishes"],c:["Administer morphine as prescribed to relieve dyspnea and anxiety"],r:"In comfort-focused care, low-dose opioids (morphine) are the standard for relieving dyspnea and air hunger. The client's documented wishes (DNR/POLST) guide care. The priority is symptom relief consistent with the client's stated goals, not escalation that contradicts them."},
{s:"A hospice client is restless and air-hungry at end of life. The provider has ordered morphine for comfort. The nurse understands the goal of this medication is to:",o:["Hasten death","Relieve the sensation of breathlessness and anxiety","Reverse the underlying disease","Increase the respiratory rate"],c:["Relieve the sensation of breathlessness and anxiety"],r:"Opioids relieve the subjective sensation of dyspnea (air hunger) and anxiety at end of life. The intent is comfort, not hastening death — the principle of double effect supports providing adequate symptom relief even if respirations slow."},
{s:"The family of a dying client with comfort-only orders asks the nurse to push IV fluids and start tube feeding. What is the best nursing response?",o:["Begin fluids and feeding immediately to honor the family","Explain that artificial nutrition/hydration are not consistent with the comfort-only plan and offer support","Tell the family these decisions are not theirs to make","Ignore the request and continue current care"],c:["Explain that artificial nutrition/hydration are not consistent with the comfort-only plan and offer support"],r:"At end of life under a comfort-focused plan, artificial nutrition and hydration often increase distress (secretions, edema) without benefit. The nurse honors the documented goals while compassionately educating and supporting the grieving family."},
{s:"A client at the end of life develops noisy, gurgling respirations ('death rattle') from pooled secretions. What is the most appropriate nursing action?",o:["Perform deep suctioning repeatedly to clear all secretions","Reposition the client and administer an antisecretory medication as ordered","Increase IV fluids to thin the secretions","Restrain the client to prevent aspiration"],c:["Reposition the client and administer an antisecretory medication as ordered"],r:"For terminal secretions, gentle repositioning (side-lying) and anticholinergic/antisecretory medications are first-line. Aggressive deep suctioning causes distress without benefit, and extra fluids worsen secretions. Comfort, not clearance, is the goal."},
{s:"Which statement reflects the correct ethical principle when titrating opioids for a dying client's pain and dyspnea?",o:["Opioids must be withheld if they might slow breathing","Adequate symptom relief is appropriate even if a side effect is slowed respirations (principle of double effect)","Comfort medications require family consensus before each dose","Pain at the end of life should be undertreated to preserve alertness"],c:["Adequate symptom relief is appropriate even if a side effect is slowed respirations (principle of double effect)"],r:"The principle of double effect supports providing proportionate symptom relief at end of life even when a foreseen but unintended side effect (respiratory depression) may occur. The intent is comfort. Withholding effective relief out of fear of this effect is not ethically required."}
]},
{group:"Septic Shock & Transfusion",qs:[
{s:"A post–septic shock client off vasopressors has Hgb 6.9 g/dL (was 8.1), HR 120, BP 92/54, lactate 3.2, and new confusion. Which action is appropriate?",o:["Administer erythropoietin for rapid correction","Prepare for packed RBC transfusion using a restrictive threshold and evaluate for bleeding","Delay transfusion until Hgb is ≤6 g/dL","Give a 2-liter crystalloid bolus and recheck in the morning"],c:["Prepare for packed RBC transfusion using a restrictive threshold and evaluate for bleeding"],r:"A sudden Hgb drop with hypoperfusion signs (confusion, tachycardia, elevated lactate) warrants transfusion and an active bleeding workup. Restrictive thresholds (~7 g/dL, or higher with active ischemia/instability) guide RBC use. Erythropoietin works too slowly for acute anemia."},
{s:"For most hemodynamically stable critically ill adults, evidence supports a RESTRICTIVE RBC transfusion threshold of approximately:",o:["Hgb 10 g/dL","Hgb 7 g/dL","Hgb 5 g/dL","Hgb 12 g/dL"],c:["Hgb 7 g/dL"],r:"A restrictive strategy transfusing at ~7 g/dL (8 g/dL for some cardiac/orthopedic patients) is as safe as or safer than liberal transfusion in most stable critically ill adults. Recognizing the evidence-based threshold is the concept tested."},
{s:"A septic client's hemoglobin drops sharply over a few hours. Beyond transfusion, what is the nurse's priority assessment?",o:["Check the client's last bowel movement","Evaluate for an active bleeding source and notify the provider","Restrict all oral intake","Increase the room temperature"],c:["Evaluate for an active bleeding source and notify the provider"],r:"A rapid Hgb decline is not explained by hemodilution alone — the nurse must look for active bleeding (GI, procedural sites, internal) and escalate. Treating the number without finding the cause misses the underlying emergency."},
{s:"Why is erythropoietin INappropriate for correcting acute symptomatic anemia in a critically ill client?",o:["It causes immediate hyperkalemia","Its effect on red cell production takes days to weeks, too slow for acute anemia","It directly lyses red blood cells","It is only used in pediatric clients"],c:["Its effect on red cell production takes days to weeks, too slow for acute anemia"],r:"Erythropoietin stimulates marrow red cell production over days to weeks. Acute, symptomatic anemia from blood loss requires transfusion for an immediate effect. Matching the intervention's time course to the urgency is the reasoning tested."},
{s:"A client with septic shock has new confusion, lactate 3.2 mmol/L, and falling hemoglobin. What do these findings together most strongly suggest?",o:["The infection has fully resolved","Inadequate oxygen delivery to tissues (hypoperfusion)","A normal response to antibiotics","Overhydration from IV fluids"],c:["Inadequate oxygen delivery to tissues (hypoperfusion)"],r:"Rising lactate, new confusion, and anemia together point to inadequate tissue oxygen delivery/perfusion. Lactate is a marker of anaerobic metabolism from hypoperfusion; confusion reflects cerebral hypoperfusion. Synthesizing these into 'tissue hypoxia' is the clinical judgment goal."}
]},
{group:"DIC Recognition",qs:[
{s:"A client with septic shock develops oozing from IV sites, petechiae, and new ecchymoses with decreasing urine output. Labs: platelets 48,000, PT and aPTT prolonged, fibrinogen low, D-dimer high. Which intervention should the nurse anticipate?",o:["Administer aspirin to reduce microthrombi","Prepare to give FFP and platelets if significant bleeding occurs, and monitor for organ dysfunction","Restrict IV fluids to prevent hemodilution","Give vitamin K as the primary treatment"],c:["Prepare to give FFP and platelets if significant bleeding occurs, and monitor for organ dysfunction"],r:"These labs (low platelets/fibrinogen, prolonged PT/aPTT, high D-dimer) plus bleeding = DIC. Management centers on treating the underlying cause (sepsis) and replacing components (FFP, platelets, cryoprecipitate) for active bleeding while monitoring for organ failure. Aspirin worsens bleeding."},
{s:"Which laboratory pattern is most consistent with disseminated intravascular coagulation (DIC)?",o:["High platelets, low D-dimer, normal PT/aPTT","Low platelets, low fibrinogen, prolonged PT/aPTT, elevated D-dimer","High fibrinogen, normal platelets, low D-dimer","Normal platelets with isolated high hemoglobin"],c:["Low platelets, low fibrinogen, prolonged PT/aPTT, elevated D-dimer"],r:"DIC consumes platelets and clotting factors (low platelets, low fibrinogen, prolonged PT/aPTT) while widespread clot breakdown raises D-dimer. This simultaneous clotting AND bleeding picture is the signature lab pattern."},
{s:"What is the MOST important principle in treating DIC?",o:["Give aspirin to all clients with DIC","Treat the underlying cause (e.g., sepsis) while supporting with blood products as needed","Withhold all blood products","Administer vitamin K as the sole therapy"],c:["Treat the underlying cause (e.g., sepsis) while supporting with blood products as needed"],r:"DIC is always secondary to a trigger (sepsis, trauma, OB emergencies, malignancy). Definitive treatment is correcting that underlying cause; blood product replacement is supportive for bleeding. Fixing the trigger is the key concept."},
{s:"A client in DIC has active bleeding. Which nursing bleeding-precaution measures are appropriate?",o:["Apply firm prolonged pressure after venipuncture, avoid IM injections, and use soft oral care devices","Encourage vigorous tooth brushing and frequent IM injections","Give aspirin and NSAIDs for comfort","Use a firm-bristle toothbrush to stimulate gums"],c:["Apply firm prolonged pressure after venipuncture, avoid IM injections, and use soft oral care devices"],r:"In DIC, bleeding precautions are essential: prolonged pressure to puncture sites, no IM injections, soft toothbrush/swabs, and avoiding antiplatelet/anticoagulant agents like aspirin and NSAIDs. These reduce bleeding from an already-depleted clotting system."},
{s:"Why does DIC cause BOTH clotting and bleeding at the same time?",o:["Two unrelated diseases occur together","Widespread clotting consumes platelets and clotting factors, leaving too few to control bleeding","The client received too much heparin","It is caused by dehydration alone"],c:["Widespread clotting consumes platelets and clotting factors, leaving too few to control bleeding"],r:"In DIC, a trigger activates diffuse microvascular clotting that consumes platelets and coagulation factors. Once consumed, the body can no longer form effective clots, so bleeding occurs simultaneously. This consumption mechanism explains the paradox and is the concept tested."}
]},
{group:"Blood Product Indications",qs:[
{s:"A massively hemorrhaging trauma client has Hgb 6.8, platelets 18,000, INR 2.1, and fibrinogen 90 mg/dL. Which product replaces oxygen-carrying capacity?",o:["Fresh frozen plasma","Packed red blood cells","Platelets","Cryoprecipitate"],c:["Packed red blood cells"],r:"PRBCs replace oxygen-carrying capacity in acute blood loss/anemia. FFP replaces clotting factors, platelets treat thrombocytopenia, and cryoprecipitate replaces fibrinogen. Matching the product to the deficiency is the skill."},
{s:"Which blood product is given primarily to correct clotting factor deficiencies (e.g., DIC, warfarin reversal, liver disease)?",o:["Packed red blood cells","Fresh frozen plasma","Albumin","Platelets"],c:["Fresh frozen plasma"],r:"FFP contains all clotting factors and is used to correct multifactor deficiencies in DIC, liver disease, and warfarin reversal. PRBCs carry oxygen, platelets treat thrombocytopenia, albumin expands volume."},
{s:"A client has a fibrinogen of 90 mg/dL with active bleeding. Which product most specifically replaces fibrinogen?",o:["Packed red blood cells","Cryoprecipitate","Albumin","Normal saline"],c:["Cryoprecipitate"],r:"Cryoprecipitate is concentrated in fibrinogen (and factors VIII, XIII, vWF) and is the targeted product for fibrinogen deficiency, common in DIC and massive hemorrhage. PRBCs and saline do not replace fibrinogen."},
{s:"Which product is indicated for a client with thrombocytopenia (platelets <20,000) or active bleeding from low platelets?",o:["Platelets","Fresh frozen plasma","Cryoprecipitate","Albumin"],c:["Platelets"],r:"Platelet transfusion is given for clinically significant thrombocytopenia (often <10,000–20,000 prophylactically, or with active bleeding). FFP and cryoprecipitate replace clotting factors/fibrinogen, not platelets."},
{s:"Albumin is most appropriately used for which purpose?",o:["Replacing oxygen-carrying capacity","Expanding intravascular volume (e.g., hypovolemia, large-volume paracentesis, burns)","Correcting clotting factor deficiency","Treating thrombocytopenia"],c:["Expanding intravascular volume (e.g., hypovolemia, large-volume paracentesis, burns)"],r:"Albumin is a colloid volume expander used in select hypovolemic states, burns, and large-volume paracentesis. It carries no oxygen and contains no clotting factors or platelets — matching product to physiologic role is the concept."}
]},
{group:"HF Pharmacology",qs:[
{s:"A client with HFrEF is being discharged on multiple medications. Which class decreases preload by promoting sodium and water excretion?",o:["Beta blockers","Loop diuretics","ACE inhibitors","Digoxin"],c:["Loop diuretics"],r:"Loop diuretics (furosemide) reduce preload by increasing sodium and water excretion, relieving congestion. Beta blockers reduce sympathetic drive, ACE inhibitors reduce afterload/remodeling, digoxin increases contractility."},
{s:"Which HF medication class decreases afterload and limits maladaptive ventricular remodeling?",o:["Loop diuretics","ACE inhibitors","Digoxin","Aldosterone antagonists"],c:["ACE inhibitors"],r:"ACE inhibitors reduce afterload (vasodilation) and block the RAAS-driven remodeling that worsens HF over time — a mortality-improving mechanism. Diuretics address preload/congestion; digoxin affects contractility."},

{s:"What does 'afterload' represent for the left ventricle?",o:["The volume of blood returning to the heart","The resistance the ventricle must overcome to eject blood","The heart rate during exercise","The amount of oxygen in the blood"],c:["The resistance the ventricle must overcome to eject blood"],r:"Afterload is the resistance/pressure the left ventricle must work against to eject blood (largely systemic vascular resistance and aortic pressure). Reducing it lowers cardiac workload and improves forward output in HF. Preload, by contrast, is the filling/stretch before contraction."},

let DATA={}, G={};

// ── UTILS ──────────────────────────────────────────────────────────────────────
const $=id=>document.getElementById(id);
const app=()=>document.getElementById('app');

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;}

function getLevel(xp){
  let l=0;
  for(let i=0;i<LEVELS.length-1;i++){if(xp<LEVELS[i].next){break;}l=i+1;}
  return Math.min(l,LEVELS.length-1);
}

function getLevelProg(xp){
  const l=getLevel(xp);
  const base=l>0?LEVELS[l-1].next:0;
  const next=LEVELS[l].next;
  if(next===Infinity)return{pct:100,label:'MAX LEVEL'};
  const pct=Math.min(100,((xp-base)/(next-base))*100);
  return{pct,label:`${xp} / ${next} XP`};
}

// ── BUILD SESSION with weighted topic selection ────────────────────────────────
function buildSession(){
  const weighted=QB.map(g=>{
    const ts=DATA.topicScores[g.group]||{c:0,w:0};
    const tot=ts.c+ts.w;
    const wr=tot>0?ts.w/tot:0;
    return{g,weight:1+wr*3};
  });
  const selected=[], pool=[...weighted];
  const n=Math.min(SESSION_LEN,QB.length);
  for(let i=0;i<n;i++){
    const totalW=pool.reduce((s,x)=>s+x.weight,0);
    let r=Math.random()*totalW;
    for(let j=0;j<pool.length;j++){r-=pool[j].weight;if(r<=0){selected.push(pool[j].g);pool.splice(j,1);break;}}
  }
  // Shuffle question ORDER so sequence is never predictable across restarts
  shuffle(selected);
  if(!DATA.seenVariants)DATA.seenVariants={};
  return selected.map(grp=>{
    // Variant rotation: never show the same wording twice in a row
    const lastIdx=DATA.seenVariants[grp.group]??-1;
    const availIdxs=grp.qs.map((_,i)=>i).filter(i=>i!==lastIdx);
    const varIdx=availIdxs.length>0
      ?availIdxs[0|Math.random()*availIdxs.length]
      :0|Math.random()*grp.qs.length;
    DATA.seenVariants[grp.group]=varIdx;
    const raw=grp.qs[varIdx];
    const shuffledOpts=shuffle([...raw.o]);
    const correctTexts=new Set(raw.c);
    const correctIdxs=[];
    shuffledOpts.forEach((txt,i)=>{if(correctTexts.has(txt))correctIdxs.push(i);});
    return{group:grp.group,stem:raw.s,opts:shuffledOpts,correctIdxs,
           rationale:raw.r,isSATA:!!(raw.type==='sata'||raw.c.length>1)};
  });
}

function getWeakTopics(n){
  return Object.entries(DATA.topicScores)
    .filter(([,v])=>v.c+v.w>0)
    .map(([k,v])=>({group:k,wr:v.w/(v.c+v.w)}))
    .sort((a,b)=>b.wr-a.wr).slice(0,n);
}

function updateStreak(){
  const today=new Date().toDateString();
  const yesterday=new Date(Date.now()-86400000).toDateString();
  if(DATA.lastPlayed===today)return;
  DATA.streak=(DATA.lastPlayed===yesterday)?DATA.streak+1:1;
  DATA.lastPlayed=today;
}

function checkBadges(sessionCorrect,sessionTotal,newXP){
  const has=b=>DATA.badges.includes(b);
  const newB=[];
  // Only award level-progression badges that actually exist in BADGES
  const lvlBadge=LVL_BADGES[getLevel(newXP)];
  if(lvlBadge&&BADGES[lvlBadge]&&!has(lvlBadge))newB.push(lvlBadge);
  newB.forEach(b=>{if(!DATA.badges.includes(b))DATA.badges.push(b);});
  return newB;
}

    </div>
    <div class="streak-card">
      <div class="streak-num">🔥 ${DATA.streak}</div>
      <div class="streak-lbl">${DATA.streak===1?'Day Streak':'Day Streak'}</div>
      <div class="streak-sub">${DATA.streak===0?'Start your streak today!':DATA.streak>=7?'Absolutely unstoppable 💥':DATA.streak>=3?'Keep the fire going! 🔥':'Great start — come back tomorrow!'}</div>
    </div>
    <button class="btn-start" onclick="startSession()">▶ &nbsp;START SESSION &nbsp;(${SESSION_LEN} Questions · ${MAX_HEARTS} Lives)</button>
    ${weak.length?`<div class="focus-card">
      <div class="sec-title">🎯 Focus Areas — Needs Work</div>
      ${weak.map(w=>`<div class="fi">
        <span class="fi-name">${w.group}</span>
        <div class="fi-right">
          <span class="fi-pct">${Math.round(w.wr*100)}% ✗</span>
          <div class="fi-bar-bg"><div class="fi-bar" style="width:${Math.round(w.wr*100)}%"></div></div>
        </div>
      </div>`).join('')}
    </div>`:''}
    <div class="badges-card">
      <div class="sec-title">🏅 Badges (${DATA.badges.length}/${allB.length})</div>
      <div class="badges-row">
        ${allB.map(id=>{const b=BADGES[id];const e=DATA.badges.includes(id);
          return`<div class="bp ${e?'earned':''}" title="${b.desc}">${b.icon} ${b.name}</div>`;}).join('')}
      </div>
    </div>
  </div>`;
}

function startSession(){
  G={qs:buildSession(),qi:0,hearts:MAX_HEARTS,xpEarned:0,correct:0,sel:[],answered:false,results:[]};
  showQ();
}

function showQ(){
  const q=G.qs[G.qi];
  G.sel=[];G.answered=false;
  const L='ABCDE';
  app().innerHTML=`<div class="session">
    <div class="hud">
      <div class="hearts">${Array.from({length:MAX_HEARTS},(_,i)=>`<span class="heart${i>=G.hearts?' lost':''}" id="h${i}">${i<G.hearts?'❤️':'🖤'}</span>`).join('')}</div>
      <div class="dots">${G.qs.map((_,i)=>`<div class="dot${i<G.qi?' done':i===G.qi?' cur':''}"></div>`).join('')}</div>
      <div class="hud-xp">+${G.xpEarned} XP</div>
    </div>
    <div class="qwrap">
      <span class="q-tag">${q.group}</span>
      <span class="q-typetag">${q.isSATA?'Select All That Apply':'Multiple Choice'}</span>
      <div class="q-stem">${q.stem}</div>
      ${q.isSATA?'<div class="sata-note">⚠️ Select ALL correct answers, then tap Submit</div>':''}
      <div class="opts">
        ${q.opts.map((o,i)=>`<button class="opt" id="o${i}" onclick="pick(${i})">
          <span class="ol">${L[i]}</span><span>${o}</span>
        </button>`).join('')}
      </div>
      ${q.isSATA?`<div class="sub-wrap"><button class="btn-sub" id="sub" onclick="submitSATA()" disabled>Submit Answer</button></div>`:''}
    </div>
  </div>`;
}

function pick(i){
  if(G.answered)return;
  const q=G.qs[G.qi];
  if(!q.isSATA){G.sel=[i];grade([i]);}
  else{
    const idx=G.sel.indexOf(i);
    if(idx===-1)G.sel.push(i);else G.sel.splice(idx,1);
    const el=$('o'+i);if(el)el.classList.toggle('sel',G.sel.includes(i));
    const sub=$('sub');if(sub)sub.disabled=G.sel.length===0;
  }
}
function submitSATA(){if(!G.answered&&G.sel.length>0)grade([...G.sel]);}

function grade(chosen){
  if(G.answered)return;
  G.answered=true;
  const q=G.qs[G.qi];
  const corr=q.correctIdxs;
  const ok=chosen.length===corr.length&&corr.every(c=>chosen.includes(c));

  q.opts.forEach((_,i)=>{
    const el=$('o'+i);if(!el)return;
    el.disabled=true;
    if(corr.includes(i))el.classList.add('correct');
    else if(chosen.includes(i))el.classList.add('wrong');
  });
  const sub=$('sub');if(sub)sub.disabled=true;

  if(!DATA.topicScores[q.group])DATA.topicScores[q.group]={c:0,w:0};
  if(ok){DATA.topicScores[q.group].c++;G.correct++;G.xpEarned+=XP_CORRECT;}
  else{DATA.topicScores[q.group].w++;G.hearts--;loseHeart();}

  G.results.push({group:q.group,correct:ok});

  const correctAnswerText=corr.map(i=>q.opts[i]).join(' & ');
  const isLast=G.qi+1>=SESSION_LEN;
  const fb=document.createElement('div');
  fb.className=`fb ${ok?'ok':'err'}`;
  fb.innerHTML=`
    <div class="fb-head">${ok?'✅ Correct!':'❌ Incorrect'}</div>
    ${!ok?`<div class="fb-correct">Correct answer: ${correctAnswerText}</div>`:''}
    <div class="fb-body">${q.rationale}</div>
    ${ok?`<div class="fb-xp">+${XP_CORRECT} XP</div>`:''}
    <button class="btn-cont" id="contBtn">${G.hearts===0?'See Results →':isLast?'Finish Session →':'Continue →'}</button>`;
  const wrap=document.querySelector('.qwrap');
  if(wrap)wrap.appendChild(fb);else document.body.appendChild(fb);
  const cb=document.getElementById('contBtn');
  if(cb)cb.onclick=next;
  fb.scrollIntoView({behavior:'smooth',block:'center'});
}

function loseHeart(){
  const lost=MAX_HEARTS-G.hearts;
  const el=$('h'+(lost-1));
  if(el){el.textContent='🖤';el.classList.add('lost','shake');}
}

function next(){
  document.querySelectorAll('.fb-overlay,.fb').forEach(e=>e.remove());
  if(G.hearts===0){showGameOver();return;}
  G.qi++;
  if(G.qi>=SESSION_LEN)endSession();
  else showQ();
}

function endSession(){
  updateStreak();
  const oldLv=getLevel(DATA.xp);
  DATA.xp+=G.xpEarned;
  DATA.totalSessions++;
  G.newBadges=checkBadges(G.correct,SESSION_LEN,DATA.xp);
  Store.save(DATA);
  showResults(oldLv);
}

function showResults(oldLv){
  const pct=Math.round(G.correct/SESSION_LEN*100);
  const newLv=getLevel(DATA.xp);
  const leveledUp=newLv>oldLv;
  const byG={};
  G.results.forEach(r=>{if(!byG[r.group])byG[r.group]={c:0,w:0};r.correct?byG[r.group].c++:byG[r.group].w++;});

  app().innerHTML=`<div class="results">
    <div class="res-icon">${pct===100?'🏆':pct>=80?'💪':pct>=60?'📚':'🔄'}</div>
    <div class="res-title">${pct===100?'Perfect Session!':pct>=80?'Great Work!':pct>=60?'Keep Studying!':'Don\'t Give Up!'}</div>
    <div class="res-sub">${G.correct}/${SESSION_LEN} correct &nbsp;·&nbsp; ${pct}%${leveledUp?`<br>🎉 Level Up! You're now ${LEVELS[newLv].icon} ${LEVELS[newLv].name}!`:''}</div>
    <div class="xp-big">+${G.xpEarned}</div>
    <div class="xp-big-lbl">XP earned this session &nbsp;·&nbsp; ${DATA.xp} XP total</div>
    <div class="stats-row">
      <div class="sbox"><div class="sn">${G.correct}</div><div class="sl">Correct</div></div>
      <div class="sbox"><div class="sn">${SESSION_LEN-G.correct}</div><div class="sl">Incorrect</div></div>
      <div class="sbox"><div class="sn">🔥${DATA.streak}</div><div class="sl">Day Streak</div></div>
    </div>
    ${G.newBadges.filter(id=>BADGES[id]).length?`<div class="new-bdg">
      <div class="sec-title">🏅 New Badges Earned!</div>
      <div class="bdg-row">${G.newBadges.filter(id=>BADGES[id]).map(id=>`<div class="bdg-pill">${BADGES[id].icon} ${BADGES[id].name}</div>`).join('')}</div>
    </div>`:''}
    <div class="breakdown">
      <div class="sec-title" style="margin-bottom:8px">Session Breakdown</div>
      ${Object.entries(byG).map(([g,v])=>`<div class="bdi">
        <span class="bdi-name">${g}</span>
        <span class="${v.w===0?'bdi-ok':'bdi-err'}">${v.w===0?'✓ Strong':'✗ Review'}</span>
      </div>`).join('')}
    </div>
    <div class="res-btns">
      <button class="btn-again" onclick="startSession()">▶ Play Again</button>
      <button class="btn-home" onclick="showHome()">🏠 Home</button>
    </div>
  </div>`;
}

function showGameOver(){
  Store.save(DATA);
  app().innerHTML=`<div class="gameover">
    <div class="go-icon">💔</div>
    <div class="go-title">Out of Hearts</div>
    <div class="go-sub">You ran out of lives with ${SESSION_LEN-G.qi} question${SESSION_LEN-G.qi!==1?'s':''} remaining.<br><br>Review your weak areas on the home screen and try again. You've got this.</div>
    <button class="btn-retry" onclick="startSession()">Try Again</button>
    <br style="margin:8px 0">
    <button class="btn-go-home" onclick="showHome()">🏠 Home</button>
  </div>`;
}

// ── INIT ───────────────────────────────────────────────────────────────────────
async function init(){DATA=await Store.load();showHome();}
init();
</script>
</body>
</html>
