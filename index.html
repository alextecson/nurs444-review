<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Blue – NURS 444</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;display:flex;justify-content:center;padding:0}
#app{width:100%;max-width:640px;position:relative}

/* HOME */
.home{padding:20px 16px 48px}
.home-header{text-align:center;padding:16px 0 20px}
.app-logo{font-size:42px}
.app-title{font-size:1.6rem;font-weight:900;color:#ef4444}
.app-sub{font-size:.8rem;color:#8b949e;margin-top:2px}
.level-card{background:#161b22;border:1px solid #21262d;border-radius:16px;padding:18px;margin-bottom:14px}
.level-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.level-badge{display:flex;align-items:center;gap:8px;font-weight:700;font-size:1rem}
.xp-lbl{font-size:.78rem;color:#8b949e}
.xp-bg{background:#21262d;border-radius:99px;height:10px;overflow:hidden}
.xp-fill{height:10px;border-radius:99px;background:linear-gradient(90deg,#22c55e,#86efac);transition:width .6s ease}
.streak-card{background:linear-gradient(135deg,#1a0f00,#2d1800);border:1px solid #f97316;border-radius:16px;padding:18px;margin-bottom:14px;text-align:center}
.streak-num{font-size:2.8rem;font-weight:900;color:#f97316;line-height:1}
.streak-lbl{font-size:.85rem;color:#fdba74;margin-top:4px}
.streak-sub{font-size:.73rem;color:#8b949e;margin-top:2px}
.btn-start{width:100%;background:linear-gradient(135deg,#22c55e,#15803d);border:none;color:#fff;padding:18px;border-radius:14px;font-size:1.1rem;font-weight:800;cursor:pointer;margin-bottom:14px;box-shadow:0 4px 20px rgba(34,197,94,.3);transition:transform .15s,opacity .15s}
.btn-start:hover{transform:translateY(-2px);opacity:.92}
.sec-title{font-size:.72rem;color:#8b949e;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;font-weight:600}
.focus-card{background:#161b22;border:1px solid #21262d;border-radius:12px;padding:14px;margin-bottom:14px}
.fi{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #21262d}
.fi:last-child{border-bottom:none}
.fi-name{font-size:.86rem;color:#c9d1d9}
.fi-right{display:flex;align-items:center;gap:7px}
.fi-pct{font-size:.73rem;color:#ef4444;font-weight:700;min-width:36px;text-align:right}
.fi-bar-bg{width:54px;background:#21262d;border-radius:99px;height:5px;overflow:hidden}
.fi-bar{height:5px;border-radius:99px;background:#ef4444}
.badges-card{background:#161b22;border:1px solid #21262d;border-radius:12px;padding:14px;margin-bottom:14px}
.badges-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
.bp{background:#21262d;border:1px solid #30363d;border-radius:8px;padding:5px 9px;font-size:.78rem;display:flex;align-items:center;gap:5px;color:#8b949e}
.bp.earned{border-color:#f59e0b;background:#2d1f00;color:#fbbf24}

/* SESSION */
.session{display:flex;flex-direction:column;min-height:100vh}
.hud{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px;background:#0d1117;border-bottom:1px solid #21262d;position:sticky;top:0;z-index:10}
.hearts{display:flex;gap:4px;font-size:1.2rem}
.heart{transition:all .3s}
.heart.lost{filter:grayscale(1);opacity:.3;transform:scale(.8)}
.dots{display:flex;gap:3px}
.dot{width:20px;height:7px;border-radius:99px;background:#21262d;transition:background .25s}
.dot.done{background:#22c55e}
.dot.cur{background:#58a6ff}
.hud-xp{font-size:.82rem;color:#58a6ff;font-weight:700}
.qwrap{padding:18px 16px}
.q-tag{display:inline-block;background:#21262d;color:#58a6ff;border-radius:6px;padding:3px 10px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.q-typetag{display:inline-block;background:#21262d;color:#8b949e;border-radius:6px;padding:3px 8px;font-size:.7rem;margin-bottom:10px;margin-left:5px}
.q-stem{font-size:1.02rem;line-height:1.65;color:#e6edf3;font-weight:500;margin-bottom:18px}
.sata-note{color:#f97316;font-size:.76rem;font-weight:600;margin-bottom:12px;background:#2d1a00;border:1px solid #f97316;border-radius:8px;padding:7px 11px}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{background:#161b22;border:2px solid #21262d;border-radius:12px;padding:13px 15px;cursor:pointer;display:flex;align-items:flex-start;gap:11px;font-size:.92rem;line-height:1.5;color:#c9d1d9;text-align:left;width:100%;transition:border-color .12s,background .12s}
.opt:hover:not([disabled]){border-color:#58a6ff;background:#0a1829;color:#e6edf3}
.opt.sel{border-color:#58a6ff;background:#0a1829}
.opt.sel .ol{background:#1f6feb;color:#fff}
.opt.correct{border-color:#22c55e!important;background:#071a0e!important}
.opt.correct .ol{background:#22c55e!important;color:#fff!important}
.opt.wrong{border-color:#ef4444!important;background:#1a0707!important}
.opt.wrong .ol{background:#ef4444!important;color:#fff!important}
.opt.missed{border-color:#22c55e!important;border-style:dashed!important}
.ol{background:#21262d;border-radius:6px;min-width:27px;height:27px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.76rem;color:#8b949e;flex-shrink:0}
.sub-wrap{padding:14px 16px;text-align:center}
.btn-sub{background:#1f6feb;border:none;color:#fff;padding:12px 36px;border-radius:10px;font-size:.92rem;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn-sub:disabled{opacity:.35;cursor:not-allowed}

/* FEEDBACK */
.fb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:99}
.fb{margin-top:20px;border-radius:14px;padding:20px;animation:fbIn .25s ease}
.fb.ok{background:#071a0e;border:2px solid #22c55e}
.fb.err{background:#1a0707;border:2px solid #ef4444}
.fb-head{font-size:1.15rem;font-weight:800;margin-bottom:7px}
.fb.ok .fb-head{color:#22c55e}
.fb.err .fb-head{color:#ef4444}
.fb-correct{font-size:.8rem;color:#f87171;font-weight:600;margin-bottom:8px}
.fb-body{font-size:.86rem;line-height:1.6;color:#c9d1d9;margin-bottom:14px}
.fb-xp{font-size:.8rem;color:#58a6ff;font-weight:700;margin-bottom:12px}
.btn-cont{width:100%;padding:14px;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer}
.fb.ok .btn-cont{background:#22c55e;color:#fff}
.fb.err .btn-cont{background:#ef4444;color:#fff}

/* RESULTS */
.results{padding:22px 16px 40px;text-align:center}
.res-icon{font-size:60px;margin-bottom:10px;animation:bounce .5s ease}
.res-title{font-size:1.5rem;font-weight:900;margin-bottom:4px}
.res-sub{color:#8b949e;font-size:.88rem;margin-bottom:20px;line-height:1.5}
.xp-big{font-size:2.4rem;font-weight:900;color:#22c55e}
.xp-big-lbl{font-size:.82rem;color:#8b949e;margin-bottom:20px}
.stats-row{display:flex;gap:10px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.sbox{background:#161b22;border:1px solid #21262d;border-radius:12px;padding:14px 20px;text-align:center}
.sn{font-size:1.5rem;font-weight:800;color:#58a6ff}
.sl{font-size:.7rem;color:#8b949e;margin-top:2px}
.new-bdg{margin-bottom:18px}
.bdg-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:8px}
.bdg-pill{background:#2d1f00;border:1px solid #f59e0b;border-radius:10px;padding:9px 13px;font-size:.83rem;color:#fbbf24;display:flex;align-items:center;gap:5px}
.breakdown{background:#161b22;border:1px solid #21262d;border-radius:12px;padding:14px;margin-bottom:20px;text-align:left}
.bdi{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #21262d;font-size:.86rem}
.bdi:last-child{border-bottom:none}
.bdi-name{color:#c9d1d9}
.bdi-ok{color:#22c55e;font-weight:700}
.bdi-err{color:#ef4444;font-weight:700}
.res-btns{display:flex;flex-direction:column;gap:10px}
.btn-again{background:linear-gradient(135deg,#22c55e,#15803d);border:none;color:#fff;padding:16px;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;box-shadow:0 4px 18px rgba(34,197,94,.3)}
.btn-home{background:#21262d;border:1px solid #30363d;color:#e6edf3;padding:14px;border-radius:12px;font-size:.93rem;font-weight:600;cursor:pointer}

/* GAME OVER */
.gameover{padding:24px 16px;text-align:center;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.go-icon{font-size:68px;margin-bottom:14px}
.go-title{font-size:1.5rem;font-weight:900;color:#ef4444;margin-bottom:8px}
.go-sub{color:#8b949e;font-size:.9rem;margin-bottom:30px;line-height:1.6}
.btn-retry{background:linear-gradient(135deg,#ef4444,#f97316);border:none;color:#fff;padding:16px 48px;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;margin-bottom:12px;display:block;width:100%;max-width:280px}
.btn-go-home{background:#21262d;border:1px solid #30363d;color:#e6edf3;padding:13px 40px;border-radius:12px;font-size:.92rem;font-weight:600;cursor:pointer;width:100%;max-width:280px}

@keyframes fbIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
.shake{animation:shake .3s ease}
@media(max-width:480px){.q-stem{font-size:.96rem}.app-title{font-size:1.4rem}}
</style>
</head>
<body>
<div id="app"><div style="text-align:center;padding:60px 20px;color:#8b949e">🚨<br><br>Loading...</div></div>
<script>
// ── QUESTION BANK ─────────────────────────────────────────────────────────────
// CRITICAL: c[] contains EXACT TEXT of correct options (matched by text, not index)
// This prevents any shuffling bugs — correct answers are always found by text match
const QB=[
{group:"Chest Tubes",qs:[
{s:"12 hours post-left lobectomy, the nurse suspects an air leak. Which chamber should show continuous bubbling to confirm?",o:["Collection chamber","Water-seal chamber","Suction control chamber","Suction regulator port"],c:["Water-seal chamber"],r:"Continuous bubbling in the water-seal (middle) chamber = air leak. Collection chamber stores drainage. Intermittent suction chamber bubbling is normal. Tidaling with respirations is expected."},
{s:"Post-thoracotomy, the nurse notes continuous bubbling in one chamber. Which chamber indicates an air leak?",o:["Suction control chamber","Drainage collection chamber","Water-seal chamber","Connector site"],c:["Water-seal chamber"],r:"Air leaks are confirmed by continuous bubbling in the water-seal chamber. Tidaling is normal. Intermittent bubbling in the suction chamber is expected when suction is applied."},
{s:"After a right upper lobectomy, the nurse finds steady bubbling that does NOT change with breathing. This finding in which chamber indicates a persistent air leak?",o:["Wet suction chamber","Drainage collection cylinder","Water-seal chamber","Suction tubing junction"],c:["Water-seal chamber"],r:"Constant bubbling in the water-seal chamber = air leak (lung or system). Tidaling is normal. Suction chamber bubbling is expected when suction is active."},
{s:"A chest tube client's water-seal chamber shows gentle rising and falling that moves with each breath but NO bubbling. How should the nurse interpret this?",o:["Air leak in the system requiring immediate clamping","Normal tidaling reflecting pleural pressure changes","Tube obstruction requiring milking","Full lung re-expansion; tube can be removed"],c:["Normal tidaling reflecting pleural pressure changes"],r:"Tidaling (fluctuation with respiration) in the water-seal chamber is EXPECTED and reflects intrapleural pressure changes. Continuous bubbling = leak. Cessation of tidaling may mean re-expansion OR obstruction — assess further before assuming either."},
{s:"A chest tube becomes disconnected from the drainage system. Until a new system is set up, what is the nurse's BEST immediate action?",o:["Clamp the chest tube near the insertion site","Submerge the tube's end in a bottle of sterile water","Lay the client flat and apply an occlusive dressing","Reconnect the contaminated tubing and continue suction"],c:["Submerge the tube's end in a bottle of sterile water"],r:"Submerging the open end in sterile water re-establishes a water seal and prevents air from entering the pleural space (tension pneumothorax risk). Clamping a chest tube can cause tension pneumothorax and is avoided. This is the reasoning behind why the water seal exists in the first place."}
]},
{group:"CVI Management",qs:[
{s:"A client with CVI and venous stasis ulcer is being discharged. Which teaching point is INCORRECT?",o:["Apply compression stockings before rising","Elevate legs above heart level daily","Keep legs dependent when sitting to improve circulation","Walk daily and do ankle-pump exercises"],c:["Keep legs dependent when sitting to improve circulation"],r:"Dependent positioning increases venous pooling and worsens edema in CVI. Elevation is essential. Compression, elevation, and walking are all correct CVI interventions."},
{s:"Which instruction is most important for a client with venous stasis ulcers?",o:["Avoid walking to protect the ulcer","Wear compression stockings and elevate legs as directed","Apply a heating pad to improve circulation","Keep the ulcer dry and uncovered"],c:["Wear compression stockings and elevate legs as directed"],r:"Compression therapy and leg elevation are the cornerstones of CVI management. Walking is encouraged (calf muscle pump). Heating pads risk burns. Venous ulcers need moist wound care."},
{s:"Which client statement about CVI management indicates a need for further teaching?",o:["I put my stockings on before I get out of bed","I prop my feet above my heart a few times a day","I sit with my feet flat on the floor when watching TV","I walk around the neighborhood every morning"],c:["I sit with my feet flat on the floor when watching TV"],r:"Keeping legs dependent increases venous pooling and worsens CVI edema. Clients should elevate legs whenever possible, not leave them in a dependent position."},
{s:"Why are graduated compression stockings applied BEFORE the client gets out of bed in the morning?",o:["Skin is cleanest first thing in the morning","Legs are least edematous before becoming dependent, so stockings fit correctly","It prevents the stockings from rolling down during the day","Morning blood pressure is lowest, reducing discomfort"],c:["Legs are least edematous before becoming dependent, so stockings fit correctly"],r:"Applying stockings before rising — while the legs are still minimally swollen — ensures correct fit and effective compression. Once legs become dependent, edema accumulates and stockings are harder to apply and less effective. This is the reasoning, not just the rule."},
{s:"A nurse is teaching about wound care for a venous stasis ulcer near the medial malleolus. Which dressing approach is appropriate?",o:["Keep the wound dry and open to air","Apply a dry gauze dressing changed twice daily","Use a moist, nonadherent dressing as ordered","Pack the ulcer tightly with dry gauze"],c:["Use a moist, nonadherent dressing as ordered"],r:"Venous ulcers heal best in a moist wound environment with nonadherent dressings, typically combined with compression. Drying out the wound bed impairs epithelialization. Tight dry packing damages granulation tissue."}
]},
{group:"TB Discharge Criteria",qs:[
{s:"A hospitalized client with pulmonary TB is improving on multi-drug therapy. Which discharge statement is most accurate?",o:["Stay until three consecutive sputum smears are negative","Discharge is appropriate with DOT arranged, public health follow-up, and no high-risk household contacts","One negative NAAT test clears the client for any facility","A negative PPD indicates readiness for discharge"],c:["Discharge is appropriate with DOT arranged, public health follow-up, and no high-risk household contacts"],r:"Safe TB discharge requires DOT arrangement, a public health monitoring plan, and no vulnerable household members. PPD does not become negative after treatment."},
{s:"Which factor makes home discharge INAPPROPRIATE for a client with active pulmonary TB?",o:["Client is tolerating medications without GI side effects","An immunocompromised family member lives in the home","Client has had two weeks of four-drug therapy","Chest x-ray shows improvement"],c:["An immunocompromised family member lives in the home"],r:"An immunocompromised household member is a contraindication to TB home discharge regardless of mask use. Transmission risk remains significant."},
{s:"Which statement about TB discharge requires correction?",o:["DOT must be arranged before discharge","Home discharge is safe with an immunocompromised household member as long as the client wears a mask","Public health follow-up is required","High-risk household contacts are a barrier to home discharge"],c:["Home discharge is safe with an immunocompromised household member as long as the client wears a mask"],r:"An immunocompromised household member is a contraindication to TB home discharge regardless of mask use."},
{s:"What is the PRIMARY purpose of directly observed therapy (DOT) in TB management?",o:["To reduce the cost of medications","To ensure adherence and prevent drug-resistant TB","To allow lower medication doses","To eliminate the need for public health follow-up"],c:["To ensure adherence and prevent drug-resistant TB"],r:"DOT means a health worker watches the client take every dose. Its core purpose is guaranteeing adherence — incomplete or inconsistent therapy is the leading driver of multidrug-resistant TB. Understanding WHY DOT exists is the point here."},
{s:"A client on TB therapy asks why they must take so many medications for so long. Which response is most accurate?",o:["Multiple drugs for months prevent resistance and treat dormant organisms","One drug would work but the others reduce side effects","The regimen can stop once symptoms resolve","Longer therapy is only needed for hospitalized clients"],c:["Multiple drugs for months prevent resistance and treat dormant organisms"],r:"TB requires prolonged multi-drug therapy because the organism replicates slowly, persists in a dormant state, and develops resistance rapidly to single agents. Stopping when symptoms resolve leaves viable organisms and breeds resistance."}
]},
{group:"Asthma Exacerbation",qs:[
{s:"A client with moderate persistent asthma has peak flow 60% of personal best, nocturnal awakenings, and SpO₂ 94%. Most appropriate action?",o:["Increase inhaled corticosteroid for immediate relief","Administer a SABA and reassess peak flow in 15–20 minutes","Send to the emergency department immediately","No action needed; reassess in 4 hours"],c:["Administer a SABA and reassess peak flow in 15–20 minutes"],r:"Peak flow 40–79% = yellow zone (moderate). Priority: SABA (albuterol) + reassessment in 15–20 minutes. Inhaled corticosteroids are controller, not rescue, agents."},
{s:"A client's peak flow is 300 L/min (personal best 500 L/min). Which medication should the nurse administer first?",o:["Budesonide (inhaled corticosteroid)","Montelukast (leukotriene antagonist)","Albuterol (SABA)","Salmeterol (LABA)"],c:["Albuterol (SABA)"],r:"Peak flow 60% = yellow zone. Albuterol (SABA) is the first-line rescue agent. Inhaled corticosteroids and LABAs are controller medications, not rescue agents."},
{s:"A client with asthma had nocturnal awakenings twice and peak flow is 65% of personal best. Which zone and priority intervention apply?",o:["Green zone; reinforce controller medication","Yellow zone; SABA and reassess in 15–20 minutes","Red zone; call 911 immediately","Blue zone; begin systemic steroids"],c:["Yellow zone; SABA and reassess in 15–20 minutes"],r:"40–79% of personal best = yellow zone (caution). Priority: SABA + peak flow reassessment in 15–20 minutes. Red zone (<40%) = emergency."},
{s:"Why is an inhaled corticosteroid NOT used as a rescue medication during an acute asthma attack?",o:["It causes immediate bronchospasm","Its anti-inflammatory effect takes hours to days, providing no rapid relief","It is only safe in children","It works faster than a SABA but costs more"],c:["Its anti-inflammatory effect takes hours to days, providing no rapid relief"],r:"Inhaled corticosteroids reduce airway inflammation over hours to days — they are CONTROLLER agents. Acute bronchospasm needs a fast-acting bronchodilator (SABA). Understanding controller vs. rescue is the concept being tested."},
{s:"A client uses their rescue albuterol inhaler more than twice per week for symptoms. How should the nurse interpret this?",o:["The asthma is well controlled","This indicates inadequate control and warrants controller therapy review","The client should switch to a LABA as rescue","This is the expected pattern for all asthmatics"],c:["This indicates inadequate control and warrants controller therapy review"],r:"Needing rescue SABA more than twice weekly signals poorly controlled asthma and is a step-up trigger for controller therapy. Frequent rescue use is a red flag, not a normal pattern."}
]},
{group:"PEEP & Hemodynamics",qs:[
{s:"ARDS patient has PEEP increased to 14 cm H₂O. BP drops to 86/50 and vasopressor requirements escalate. Most likely cause?",o:["Improved alveolar recruitment increased venous return","Decreased preload from elevated intrathoracic pressure","Acute metabolic alkalosis from over-ventilation","Increased cardiac contractility from better oxygenation"],c:["Decreased preload from elevated intrathoracic pressure"],r:"High PEEP increases intrathoracic pressure → compresses right heart → reduces venous return (preload) → decreased cardiac output → hypotension. Classic PEEP hemodynamic complication."},
{s:"An ARDS patient is on PEEP 12 cm H₂O. Which finding is the strongest indicator that PEEP may need to be REDUCED?",o:["PaO₂ 55 mmHg and SaO₂ 88%","Blood pressure 84/46 mmHg","Bilateral bronchial breath sounds","First-degree AV block at rate 58"],c:["Blood pressure 84/46 mmHg"],r:"Hypotension signals that PEEP is impairing venous return and reducing cardiac output → may need to reduce PEEP. Low PaO₂/SaO₂ would suggest the need to INCREASE PEEP."},
{s:"After increasing PEEP from 10 to 16 cm H₂O, which finding represents an adverse hemodynamic effect?",o:["Increased urine output from improved renal perfusion","Rising CVP with concurrent hypotension","Warm extremities and bounding peripheral pulses","Decreasing heart rate from improved cardiac output"],c:["Rising CVP with concurrent hypotension"],r:"High PEEP reduces venous return → CVP may rise paradoxically (backpressure) while BP falls due to decreased cardiac output. This is the key hemodynamic side effect of high PEEP."},
{s:"What is the PRIMARY therapeutic goal of adding PEEP for a client with ARDS?",o:["Increase minute ventilation to lower PaCO₂","Improve oxygenation by preventing end-expiratory alveolar collapse","Mobilize secretions by increasing expiratory flow","Decrease work of breathing by lowering the respiratory rate"],c:["Improve oxygenation by preventing end-expiratory alveolar collapse"],r:"PEEP keeps alveoli open at end-expiration, increasing functional residual capacity and surface area for gas exchange → improved oxygenation. It does not primarily affect CO₂ clearance or secretion mobilization."},
{s:"A nurse increases PEEP to treat refractory hypoxemia. Which assessment best monitors for the most dangerous side effect of this change?",o:["Hourly urine output","Blood pressure and signs of decreased cardiac output","Pupillary response","Bowel sounds"],c:["Blood pressure and signs of decreased cardiac output"],r:"The dangerous side effect of high PEEP is reduced venous return → decreased cardiac output → hypotension (and barotrauma). Monitoring BP, perfusion, and CO markers detects this earliest. This connects the intervention to the assessment priority."}
]},
{group:"Heart Failure Teaching",qs:[
{s:"Which statement by a newly diagnosed heart failure client indicates effective teaching?",o:["I'll call if I gain more than 2–3 lbs in a day or 5 lbs in a week","I'll use my nitroglycerin patch when I feel short of breath","I take furosemide at bedtime to avoid daytime bathroom trips","An extra pillow fixes my nighttime shortness of breath"],c:["I'll call if I gain more than 2–3 lbs in a day or 5 lbs in a week"],r:"Rapid weight gain signals fluid retention → call provider. Nitro is for angina, not dyspnea. Furosemide at bedtime causes nocturia. Extra pillows manage symptoms but don't treat the problem."},
{s:"Which HF weight monitoring instruction is correct?",o:["Weigh weekly at the same time","Report a weight gain of ≥2 pounds in one day to your provider","Weigh after meals for the most accurate reading","Weight gain of up to 5 lbs daily is expected"],c:["Report a weight gain of ≥2 pounds in one day to your provider"],r:"HF clients should weigh daily (morning, before eating, after voiding) and report ≥2 lbs/day or ≥5 lbs/week — signals of fluid overload requiring medication adjustment."},
{s:"A 72-year-old HF client calls reporting a 4-lb weight gain since yesterday morning. How should the nurse triage?",o:["Normal daily fluctuation; recheck tomorrow","Urgent provider notification — acute fluid retention","Restrict fluids and call back in 3 days","Take an extra furosemide dose independently"],c:["Urgent provider notification — acute fluid retention"],r:"4 lbs in 24 hours = acute decompensation red flag. Urgent provider contact required. Self-medicating with additional diuretics without direction is unsafe."},
{s:"Why is daily weight the single most important self-monitoring tool the nurse teaches a heart failure client?",o:["It tracks muscle gain from exercise","It detects fluid retention before severe symptoms develop","It replaces the need for blood pressure checks","It indicates medication is being absorbed"],c:["It detects fluid retention before severe symptoms develop"],r:"A sudden weight gain reflects fluid retention days BEFORE dyspnea and edema become severe, allowing early intervention. This early-warning logic is why daily weights anchor HF self-care teaching."},
{s:"A heart failure client reports nighttime shortness of breath relieved by sitting up. Which teaching is most appropriate?",o:["This is normal aging and needs no follow-up","Report this orthopnea/PND to your provider as it may signal worsening HF","Take an extra dose of beta-blocker at night","Sleep flat to retrain your breathing"],c:["Report this orthopnea/PND to your provider as it may signal worsening HF"],r:"Orthopnea and paroxysmal nocturnal dyspnea reflect fluid redistribution when supine and indicate worsening congestion. They warrant provider notification, not symptom-masking with extra pillows or unscheduled medication."}
]},
{group:"Palliative vs Hospice",qs:[
{s:"A client with metastatic lung cancer on chemotherapy reports unmanageable pain and fatigue. Most appropriate referral?",o:["Hospice care","Palliative care","Home health services only","No referral until chemotherapy stops"],c:["Palliative care"],r:"Palliative care can be provided alongside disease-directed therapy at any stage. Hospice requires stopping curative treatment and a prognosis ≤6 months."},
{s:"A client with stage IV cancer on immunotherapy has severe pain and anxiety. Which service best addresses symptoms while continuing treatment?",o:["Hospice, because prognosis is poor","Palliative care, concurrent with ongoing treatment","Home health for IV medication only","Psychiatry consult exclusively"],c:["Palliative care, concurrent with ongoing treatment"],r:"Palliative care is appropriate at any illness stage alongside any treatment. Hospice requires ≤6-month prognosis AND stopping curative treatment."},
{s:"Which statement best distinguishes palliative care from hospice?",o:["Palliative care requires a ≤6-month prognosis","Hospice can be provided during active chemotherapy","Palliative care addresses comfort and quality of life at any disease stage regardless of treatment status","Hospice and palliative care are interchangeable terms"],c:["Palliative care addresses comfort and quality of life at any disease stage regardless of treatment status"],r:"Palliative care = comfort at ANY stage with ANY treatment. Hospice = comfort only, no curative treatment, prognosis ≤6 months."},
{s:"A client asks when hospice — rather than palliative care — becomes appropriate. Which response is most accurate?",o:["When the client wants help managing symptoms during chemotherapy","When curative treatment is stopped and prognosis is six months or less","Only after all family members agree","When the client is admitted to the ICU"],c:["When curative treatment is stopped and prognosis is six months or less"],r:"Hospice eligibility requires a prognosis of ≤6 months AND a shift away from curative treatment toward comfort-only care. This is the defining boundary between hospice and palliative care."},
{s:"A nurse explains that a client can receive palliative care during active cancer treatment. What is the underlying principle?",o:["Palliative care is only for the dying","Symptom and quality-of-life management can occur alongside disease-directed therapy","Palliative care replaces oncology treatment","Palliative care requires a DNR order"],c:["Symptom and quality-of-life management can occur alongside disease-directed therapy"],r:"The core principle of palliative care is that comfort, symptom control, and quality of life are addressed concurrently with curative or life-prolonging treatment — no prognosis limit and no DNR requirement."}
]},
{group:"Silent Chest – Status Asthmaticus",qs:[
{s:"A status asthmaticus client who was loudly wheezing now has absent bilateral breath sounds and a dropping SpO₂. What does this indicate?",o:["Bronchospasm is resolving — improvement","Silent chest: critical deterioration requiring immediate intervention","Pneumonia has developed","The bronchodilator is working"],c:["Silent chest: critical deterioration requiring immediate intervention"],r:"Silent chest in status asthmaticus = airways so severely obstructed that no air moves in or out. This is pre-respiratory arrest. Immediate intervention required — not reassurance."},
{s:"Which finding in status asthmaticus is the MOST ominous and requires the most urgent action?",o:["Expiratory wheezing with prolonged I:E ratio","Accessory muscle use with RR 28","Silent chest with decreasing SpO₂","Tachycardia at HR 108 after albuterol"],c:["Silent chest with decreasing SpO₂"],r:"Silent chest = no audible air movement = critical airway obstruction and impending respiratory arrest. Tachycardia after albuterol is a common expected side effect."},
{s:"An asthmatic client who was wheezing on arrival is now quiet, less responsive, with faint breath sounds. Priority action?",o:["Document that wheezing resolved","Immediately notify provider — critical airflow obstruction","Give another bronchodilator treatment and wait 15 minutes","Reduce oxygen flow to prevent hyperoxia"],c:["Immediately notify provider — critical airflow obstruction"],r:"Disappearance of wheezing + decreasing mentation = silent chest = deterioration, NOT improvement. Notify the provider immediately and prepare for intubation."},
{s:"Why is a 'silent chest' in severe asthma more dangerous than loud wheezing?",o:["Wheezing always indicates respiratory arrest","Absent breath sounds mean airflow is too low to generate any sound — near-total obstruction","Silent chest means the attack has resolved","Loud wheezing requires intubation but silence does not"],c:["Absent breath sounds mean airflow is too low to generate any sound — near-total obstruction"],r:"Wheezing requires moving air through narrowed airways. When obstruction becomes so severe that almost no air moves, the chest goes silent — a pre-arrest sign. Counterintuitively, silence is worse than wheezing. That reasoning is the concept tested."},
{s:"A child in status asthmaticus becomes drowsy with a rising PaCO₂ after an initially low PaCO₂. How should the nurse interpret the rising CO₂?",o:["The child is improving and tiring appropriately for sleep","Impending respiratory failure from fatigue — emergent intervention needed","Normal compensation for the asthma attack","The albuterol is working and CO₂ will normalize"],c:["Impending respiratory failure from fatigue — emergent intervention needed"],r:"Early in an asthma attack, tachypnea blows off CO₂ (low PaCO₂). A 'normalizing' or rising PaCO₂ with drowsiness signals the child can no longer sustain the work of breathing — respiratory failure is imminent. A normal CO₂ in a severe attack is an ominous sign."}
]},
{group:"COPD & Hypoxic Drive",qs:[
{s:"An end-stage COPD patient with chronic hypercapnia is on 100% O₂ via NRB mask. ABG: pH 7.32, PaCO₂ 68, PaO₂ 54. What complication may result from high-flow oxygen?",o:["Increased respiratory drive and improved gas exchange","Respiratory depression from suppression of the hypoxic drive","Respiratory alkalosis from excessive CO₂ elimination","Improved oxygenation without CO₂ effect"],c:["Respiratory depression from suppression of the hypoxic drive"],r:"Chronic CO₂ retainers rely on low PaO₂ (hypoxic drive) as their primary respiratory stimulus. High-flow O₂ eliminates this drive → respiratory depression. Target SpO₂: 88–92%."},
{s:"When caring for a COPD patient who chronically retains CO₂, which SpO₂ range should the nurse target?",o:["94–98%","88–92%","98–100%","85–88%"],c:["88–92%"],r:"Target SpO₂ 88–92% in COPD with chronic hypercapnia. Higher levels risk suppressing the hypoxic respiratory drive, causing CO₂ narcosis and respiratory failure."},
{s:"A COPD patient with CO₂ retention is receiving high-flow oxygen. The nurse's priority concern is:",o:["Oxygen toxicity causing lung damage within hours","Suppression of hypoxic drive leading to CO₂ narcosis","Increased mucus production worsening secretions","Barotrauma from increased airway pressure"],c:["Suppression of hypoxic drive leading to CO₂ narcosis"],r:"In chronic CO₂ retainers, the hypoxic drive may be the primary breathing stimulus. Overcorrecting hypoxemia with high-flow O₂ can suppress this drive → respiratory depression."},
{s:"A COPD client's SpO₂ is 90% on 2 L nasal cannula. A new nurse wants to increase O₂ to reach 99%. What is the BEST guidance?",o:["Increase oxygen until SpO₂ is at least 98%","Maintain SpO₂ around 88–92% to preserve respiratory drive","Discontinue oxygen entirely","Switch immediately to a non-rebreather mask"],c:["Maintain SpO₂ around 88–92% to preserve respiratory drive"],r:"In chronic CO₂ retainers, pushing SpO₂ to near-100% risks suppressing the hypoxic drive and worsening hypercapnia. The target is controlled oxygenation (88–92%) — enough to perfuse tissues without abolishing the drive to breathe."},
{s:"What physiologic change explains why some COPD clients rely on a hypoxic drive to breathe?",o:["Chronic hypercapnia blunts the brain's CO₂-sensing response, leaving low O₂ as the main stimulus","Their lungs cannot absorb any oxygen","They have lost all chemoreceptor function","High bicarbonate prevents any breathing"],c:["Chronic hypercapnia blunts the brain's CO₂-sensing response, leaving low O₂ as the main stimulus"],r:"Long-standing CO₂ retention desensitizes central chemoreceptors to high CO₂, so peripheral chemoreceptors responding to low PaO₂ become the dominant breathing stimulus. This is the mechanism behind cautious oxygen titration in COPD."}
]},
{group:"BiPAP Failure",qs:[
{s:"A COPD patient on BiPAP becomes difficult to arouse. ABG: pH 7.21, PaCO₂ 72, PaO₂ 88 on 40% FiO₂. Priority action?",o:["Increase FiO₂ to 100% and reassess in 30 min","Administer a benzodiazepine for agitation","Notify provider and prepare for intubation","Continue BiPAP and get a chest x-ray"],c:["Notify provider and prepare for intubation"],r:"BiPAP has failed: pH 7.21 + rising CO₂ + worsening consciousness = impending respiratory arrest. Increasing FiO₂ worsens CO₂ retention. Benzodiazepines suppress respirations further. Urgent intubation required."},
{s:"A COPD patient on BiPAP for 2 hours shows increasing somnolence. ABG: pH 7.18, PaCO₂ 80. Most appropriate response?",o:["Increase BiPAP pressure and reassess in 1 hour","Administer naloxone to reverse respiratory depression","Activate rapid response and anticipate emergent intubation","Place patient prone to improve oxygenation"],c:["Activate rapid response and anticipate emergent intubation"],r:"Worsening pH (7.18) + rising CO₂ + altered mental status on BiPAP = therapy failure + impending arrest. Naloxone is for opioid reversal. Prone is used in ARDS, not COPD."},
{s:"Which finding in a COPD patient on BiPAP requires IMMEDIATE provider notification for escalation of care?",o:["RR decreasing from 32 to 22 breaths per minute","Patient reports the mask is uncomfortable","Increasing drowsiness with pH 7.20 and PaCO₂ 78","SpO₂ improving from 87% to 92%"],c:["Increasing drowsiness with pH 7.20 and PaCO₂ 78"],r:"Worsening pH + rising CO₂ + increasing drowsiness on BiPAP = therapy failure → urgent escalation. Improving RR and SpO₂ indicate BiPAP is working — no escalation needed."},
{s:"Why is a declining level of consciousness the most concerning sign of BiPAP failure in hypercapnic respiratory failure?",o:["It indicates the mask straps are too tight","It signals rising CO₂ (CO₂ narcosis) and inability to protect the airway","It means the client is comfortable and resting","It is unrelated to the respiratory status"],c:["It signals rising CO₂ (CO₂ narcosis) and inability to protect the airway"],r:"Worsening mental status during BiPAP reflects climbing CO₂ (narcosis) and growing aspiration/arrest risk. A client who cannot stay awake cannot protect their airway or tolerate noninvasive support — intubation is needed. This is the reasoning behind escalation."},
{s:"A client on BiPAP for COPD exacerbation begins vomiting and becomes obtunded. What is the nurse's priority concern?",o:["Skin breakdown from the mask","Aspiration and loss of airway protection requiring intubation","Dry mucous membranes","Mask-related claustrophobia"],c:["Aspiration and loss of airway protection requiring intubation"],r:"Vomiting plus a decreasing level of consciousness on BiPAP is dangerous: the mask can force gastric contents into the airway and the obtunded client cannot protect the airway. This is a classic indication to remove BiPAP and intubate."}
]},
{group:"ABG Interpretation",qs:[
{s:"COPD patient ABG: pH 7.28, PaCO₂ 68, PaO₂ 84 on 40% FiO₂, HCO₃ 30. Which best describes this condition?",o:["Metabolic acidosis without respiratory involvement","Acute hypercapnic (Type 2) respiratory failure","Pure hypoxemic (Type 1) respiratory failure","Metabolic alkalosis with respiratory compensation"],c:["Acute hypercapnic (Type 2) respiratory failure"],r:"Low pH + elevated PaCO₂ = respiratory acidosis. Elevated HCO₃ = chronic metabolic compensation. Combined = acute-on-chronic hypercapnic (Type 2) respiratory failure."},
{s:"ABG: pH 7.30, PaCO₂ 72, PaO₂ 58, HCO₃ 28. Which interpretation is correct?",o:["Respiratory alkalosis with metabolic compensation","Combined acidosis requiring sodium bicarbonate","Acute hypercapnic failure with partial metabolic compensation","Normal ABG values for a COPD patient"],c:["Acute hypercapnic failure with partial metabolic compensation"],r:"Low pH (acidosis) + high PaCO₂ (respiratory cause) + elevated HCO₃ (chronic metabolic compensation) = acute-on-chronic hypercapnic respiratory failure."},
{s:"Which ABG pattern is most consistent with acute-on-chronic hypercapnic respiratory failure in COPD?",o:["pH 7.48, PaCO₂ 28, PaO₂ 95, HCO₃ 20","pH 7.30, PaCO₂ 70, PaO₂ 55, HCO₃ 32","pH 7.38, PaCO₂ 42, PaO₂ 90, HCO₃ 24","pH 7.20, PaCO₂ 18, PaO₂ 85, HCO₃ 10"],c:["pH 7.30, PaCO₂ 70, PaO₂ 55, HCO₃ 32"],r:"Acidic pH + elevated CO₂ (respiratory) + low PaO₂ + elevated HCO₃ (chronic renal compensation) = hallmark of acute-on-chronic Type 2 respiratory failure in COPD."},
{s:"ABG: pH 7.50, PaCO₂ 28, PaO₂ 96, HCO₃ 24. A client is anxious and breathing rapidly. Which interpretation is correct?",o:["Respiratory acidosis","Acute respiratory alkalosis from hyperventilation","Metabolic acidosis","Type 2 respiratory failure"],c:["Acute respiratory alkalosis from hyperventilation"],r:"High pH (alkalosis) + low PaCO₂ (respiratory cause, blown off by hyperventilation) + normal HCO₃ = acute respiratory alkalosis. Anxiety-driven hyperventilation is a classic cause. Reading direction of pH and CO₂ together is the skill tested."},
{s:"ABG: pH 7.31, PaCO₂ 40, PaO₂ 90, HCO₃ 16. A client has severe diarrhea. Which interpretation is correct?",o:["Respiratory acidosis","Metabolic acidosis (likely from bicarbonate loss)","Respiratory alkalosis","Metabolic alkalosis"],c:["Metabolic acidosis (likely from bicarbonate loss)"],r:"Low pH with a LOW HCO₃ and a normal PaCO₂ = metabolic acidosis. Diarrhea causes loss of bicarbonate-rich intestinal fluid. Because CO₂ is normal, the cause is metabolic, not respiratory."}
]},
{group:"Tracheostomy Management",qs:[
{s:"A cuffed tracheostomy client is anxious, tachycardic, SpO₂ 85%, with coarse sounds from the stoma and inability to clear secretions. First action?",o:["Deflate the tracheostomy cuff","Suction the tracheostomy with sterile technique","Call the respiratory therapist","Remove and replace the tracheostomy tube"],c:["Suction the tracheostomy with sterile technique"],r:"Coarse sounds + inability to clear secretions + acute hypoxemia = secretion obstruction. Sterile suctioning is the immediate priority. Removing the tube or deflating the cuff without clearing the obstruction first is dangerous."},
{s:"A tracheostomy patient has SpO₂ 83% and thick secretions visible in the stoma. Immediate priority?",o:["Notify the physician and wait for orders","Suction the tracheostomy immediately","Deflate the cuff to allow breathing around the tube","Administer a nebulized bronchodilator"],c:["Suction the tracheostomy immediately"],r:"Visible secretions causing acute airway obstruction = immediate suctioning. This is an airway emergency — do not wait for orders when the cause is identified and the airway is compromised."},
{s:"A trach patient alarms at SpO₂ 80%. Coarse sounds are audible from the stoma. Which action is correct?",o:["Apply 100% O₂ via non-rebreather mask","Perform sterile suctioning via the tracheostomy","Call a code and initiate CPR","Change the tracheostomy tube immediately"],c:["Perform sterile suctioning via the tracheostomy"],r:"Sterile suctioning relieves the secretion obstruction causing hypoxemia. A non-rebreather mask cannot bypass a mechanical obstruction within the tracheostomy tube."},
{s:"To minimize hypoxia during tracheostomy suctioning, which technique is correct?",o:["Apply suction continuously while inserting the catheter","Hyperoxygenate before suctioning and limit each pass to about 10 seconds","Suction for 30 seconds per pass to clear all secretions","Instill 10 mL saline routinely before every pass"],c:["Hyperoxygenate before suctioning and limit each pass to about 10 seconds"],r:"Hyperoxygenate before suctioning and keep each pass ≤10 seconds, applying suction only on withdrawal, to limit hypoxia. Continuous suction on insertion and prolonged passes worsen hypoxemia and trauma. Routine saline instillation is not evidence-based."},
{s:"A new tracheostomy becomes dislodged 12 hours postoperatively and the nurse cannot easily reinsert it. What is the priority action?",o:["Force the tube back in with firm pressure","Cover the stoma with gauze and have the client breathe through the mouth only","Call for help, maintain oxygenation, and keep the obturator/replacement and a tracheostomy kit at the bedside","Wait for the surgeon without intervening"],c:["Call for help, maintain oxygenation, and keep the obturator/replacement and a tracheostomy kit at the bedside"],r:"A fresh trach (before the tract matures, ~7 days) can lose its tract if dislodged. Do not force reinsertion. Call for help, support oxygenation (cover stoma and ventilate over the mouth/nose if needed), and have the bedside emergency trach kit and obturator ready for skilled reinsertion."}
]},
{group:"RSI Medications",qs:[
{s:"During RSI preparation, which medication provides the PARALYSIS component?",o:["Midazolam","Etomidate","Succinylcholine","Fentanyl"],c:["Succinylcholine"],r:"Succinylcholine (depolarizing neuromuscular blocker) provides rapid-onset, short-duration paralysis for RSI. Etomidate is the induction/sedation agent. Midazolam and fentanyl provide sedation/analgesia, not paralysis."},
{s:"Which combination is most appropriate for the induction and paralysis phases of RSI?",o:["Propofol and vecuronium","Etomidate and succinylcholine","Midazolam and naloxone","Fentanyl and atropine"],c:["Etomidate and succinylcholine"],r:"Classic RSI: etomidate (hemodynamically stable induction agent) + succinylcholine (rapid paralysis) or rocuronium. Propofol can cause hypotension. Vecuronium has a slower onset."},
{s:"Why is etomidate preferred over propofol for RSI induction in hemodynamically unstable patients?",o:["Etomidate causes more bronchodilation","Etomidate has minimal effect on blood pressure compared to propofol","Etomidate provides longer duration of paralysis","Etomidate eliminates the need for a neuromuscular blocker"],c:["Etomidate has minimal effect on blood pressure compared to propofol"],r:"Etomidate is hemodynamically neutral — minimal BP effect. Propofol causes vasodilation and myocardial depression, making it risky in hemodynamically unstable patients."},
{s:"A nurse is preparing RSI medications. Which agent is an INDUCTION (sedation) agent rather than a paralytic?",o:["Rocuronium","Succinylcholine","Etomidate","Vecuronium"],c:["Etomidate"],r:"Etomidate is a sedative/hypnotic induction agent. Succinylcholine, rocuronium, and vecuronium are neuromuscular blockers (paralytics). Knowing which RSI drug does what — sedate vs. paralyze — is the concept tested."},
{s:"A client received succinylcholine during RSI. Which adverse effect should the nurse monitor for most closely?",o:["Profound hypertension","Hyperkalemia and risk of dysrhythmias","Prolonged sedation lasting hours","Excessive bronchodilation"],c:["Hyperkalemia and risk of dysrhythmias"],r:"Succinylcholine causes transient potassium release and can trigger dangerous hyperkalemia (especially in burns, crush injury, or paralysis) along with risks of malignant hyperthermia and bradycardia. It is short-acting, not long. Monitoring for hyperkalemic dysrhythmias is key."}
]},
{group:"ETT Placement",qs:[
{s:"After intubation, the nurse hears gurgling over the epigastrium, breath sounds absent bilaterally, and ETCO₂ is negative. What has most likely occurred?",o:["Right mainstem intubation","Esophageal intubation","Laryngospasm","Successful tracheal intubation"],c:["Esophageal intubation"],r:"Epigastric gurgling + absent bilateral breath sounds + negative ETCO₂ = esophageal intubation. LIFE-THREATENING: Remove ETT immediately, ventilate with BVM at 100% O₂, then reattempt."},
{s:"Which single finding is MOST reliable in confirming correct ETT placement in the trachea?",o:["Visible chest rise with each breath","Continuous waveform capnography (ETCO₂)","SpO₂ improvement within 30 seconds","Absence of coughing during intubation"],c:["Continuous waveform capnography (ETCO₂)"],r:"Continuous waveform capnography is the gold standard for ETT placement confirmation. Chest rise can be misleading. SpO₂ improvement may be delayed and can occur transiently with esophageal placement."},
{s:"After intubation, SpO₂ is 89%, breath sounds absent on the left, clear on the right, and ETCO₂ waveform is positive. Most likely problem?",o:["Esophageal intubation","Right mainstem bronchus intubation","Left-sided pneumothorax","Laryngospasm"],c:["Right mainstem bronchus intubation"],r:"Absent left + present right breath sounds + positive ETCO₂ = right mainstem intubation (ETT advanced past the carina). Withdraw ETT 1–2 cm and reassess bilateral breath sounds."},
{s:"Immediately after intubation, breath sounds are absent on the left and present on the right, ETCO₂ is positive, and condensation is in the tube. What is the nurse's FIRST action?",o:["Obtain a stat chest x-ray","Withdraw the ETT 1–2 cm while monitoring breath sounds","Increase FiO₂ to 100% and reassess","Replace the ETT with a larger size"],c:["Withdraw the ETT 1–2 cm while monitoring breath sounds"],r:"Positive ETCO₂ confirms tracheal (not esophageal) placement, so the unequal breath sounds indicate right mainstem intubation. The immediate corrective action is to withdraw the tube 1–2 cm and recheck for bilateral sounds — before waiting on an x-ray."},
{s:"Why is right mainstem intubation more common than left when an ETT is advanced too far?",o:["The left bronchus is wider","The right mainstem bronchus is shorter, wider, and more vertical","The left lung has more lobes","The carina deflects tubes leftward"],c:["The right mainstem bronchus is shorter, wider, and more vertical"],r:"The right mainstem bronchus branches at a less acute, more vertical angle than the left, so an over-advanced ETT naturally tends to enter the right side. This anatomy explains the classic 'absent left breath sounds' finding."}
]},
{group:"Acute Decompensated HF",qs:[
{s:"A 72-year-old with HF: SpO₂ 88%, BNP 1,200 pg/mL, LVEF 28%, pulmonary edema on CXR. Most accurate interpretation?",o:["Findings reflect improved cardiac output","Consistent with decompensated HFrEF requiring urgent treatment","Labs are normal for age; no action needed","Hyponatremia alone explains the dyspnea"],c:["Consistent with decompensated HFrEF requiring urgent treatment"],r:"LVEF 28% + elevated BNP + pulmonary edema + hypoxemia = decompensated HFrEF. BNP >500 is strongly associated with acute decompensated HF requiring urgent intervention."},
{s:"A client with HF has bibasilar crackles, 2+ ankle edema, orthopnea, HR 112, and SpO₂ 90%. Which finding most strongly supports acute decompensation?",o:["Clear lungs with brisk capillary refill","Bibasilar crackles with bilateral ankle edema","Dry mucous membranes and flat neck veins","Bounding pulses with warm flushed skin"],c:["Bibasilar crackles with bilateral ankle edema"],r:"Bibasilar crackles (pulmonary edema from left HF) + dependent edema (right HF) are the hallmark signs of decompensated heart failure. The other options suggest hypovolemia or distributive shock."},
{s:"A client with HF gained 4 lbs since yesterday and needs 3 pillows to sleep. Which lab result most strongly confirms decompensated HF?",o:["Troponin I 0.04 ng/mL","NT-proBNP 4,800 pg/mL","Potassium 3.2 mEq/L","Creatinine 1.4 mg/dL"],c:["NT-proBNP 4,800 pg/mL"],r:"Markedly elevated NT-proBNP is highly specific for acute HF decompensation, reflecting ventricular wall stress from volume overload. It distinguishes HF dyspnea from pulmonary or other causes."},
{s:"What does an elevated BNP (or NT-proBNP) physiologically reflect in a client with dyspnea?",o:["Active myocardial infarction","Ventricular wall stretch and stress from volume/pressure overload","Pulmonary embolism","Bacterial pneumonia"],c:["Ventricular wall stretch and stress from volume/pressure overload"],r:"BNP is released by ventricular myocytes in response to wall stretch from volume and pressure overload. That is why it helps distinguish cardiac (HF) dyspnea from pulmonary causes — the mechanism is the concept tested."},
{s:"A client with HFrEF presents with worsening dyspnea, JVD, S₃ gallop, and crackles. Which is the priority nursing action?",o:["Lay the client flat to increase venous return","Place in high-Fowler's, apply oxygen, and notify the provider","Encourage ambulation to mobilize fluid","Withhold all medications until labs return"],c:["Place in high-Fowler's, apply oxygen, and notify the provider"],r:"Acute decompensated HF with pulmonary congestion needs upright positioning (reduces preload and eases work of breathing), oxygen, and prompt provider notification for diuresis and afterload reduction. Lying flat worsens pulmonary congestion."}
]},
{group:"HCM & Sudden Cardiac Death",qs:[
{s:"A 22-year-old athlete with newly diagnosed HCM asks about sudden cardiac death (SCD) risk. Which response is most appropriate?",o:["HCM increases SCD risk especially with exertion — avoid competitive athletics and follow up with cardiology","SCD is rare in HCM and usually affects only older adults","A pacemaker will prevent sudden cardiac death","Nitroglycerin before workouts lowers arrhythmia risk"],c:["HCM increases SCD risk especially with exertion — avoid competitive athletics and follow up with cardiology"],r:"HCM is the leading cause of SCD in young athletes. Dynamic LVOT obstruction and ventricular arrhythmias triggered by exertion drive this risk. Competitive athletics must be restricted pending cardiology evaluation."},
{s:"A young athlete with HCM asks about returning to competitive sports. Which response is most accurate?",o:["Competitive athletics are safe with proper warm-up","Avoid competitive athletics and pursue cardiology risk stratification","A pacemaker eliminates SCD risk in HCM","Nitroglycerin before exercise will prevent arrhythmias"],c:["Avoid competitive athletics and pursue cardiology risk stratification"],r:"HCM patients are restricted from competitive athletics due to SCD risk from dynamic LVOT obstruction and exercise-triggered ventricular arrhythmias. Risk stratification ± ICD via cardiology is required."},
{s:"How does the HCM murmur respond to the Valsalva maneuver?",o:["Decreases in intensity","Increases in intensity","Is unchanged","Disappears completely"],c:["Increases in intensity"],r:"The HCM murmur increases with Valsalva (and standing) because decreased preload worsens dynamic LVOT obstruction. It decreases with squatting (increased preload). This is the opposite of most cardiac murmurs."},
{s:"Why are nitrates and aggressive diuresis generally AVOIDED in symptomatic HCM with outflow obstruction?",o:["They increase preload and worsen heart failure","They reduce preload, which worsens dynamic LV outflow obstruction","They cause severe hypertension","They have no effect on HCM"],c:["They reduce preload, which worsens dynamic LV outflow obstruction"],r:"In obstructive HCM, anything that lowers preload (nitrates, aggressive diuresis, dehydration) brings the hypertrophied septum and mitral leaflet closer together, worsening outflow obstruction and symptoms. This reasoning is the key teaching point — the opposite of typical HF management."},
{s:"Which symptom in a client with HCM is the strongest red flag for sudden cardiac death risk and needs urgent cardiology evaluation?",o:["Mild fatigue after a long shift","Exertional syncope or chest pain","Occasional heartburn","Resting heart rate of 60"],c:["Exertional syncope or chest pain"],r:"Syncope or chest pain with exertion in HCM suggests dynamic outflow obstruction and arrhythmia risk during the high-demand state — the exact scenario linked to sudden cardiac death. It warrants urgent risk stratification."}
]},
{group:"VAP Prevention Bundle",qs:[
{s:"Which action is NOT part of the evidence-based VAP prevention bundle?",o:["Elevating HOB to 30–45 degrees","Performing daily sedation vacations","Changing ventilator circuit tubing every 12 hours","Providing oral care with chlorhexidine"],c:["Changing ventilator circuit tubing every 12 hours"],r:"Routine circuit changes every 12 hours are NOT evidence-based and may INCREASE VAP risk. Circuits should only be changed when visibly contaminated. The other three are core VAP bundle components."},
{s:"Which VAP bundle intervention is most directly aimed at reducing aspiration of subglottic secretions?",o:["Daily sedation interruption","HOB elevation to 30–45 degrees","Subglottic secretion drainage","Chlorhexidine oral care"],c:["Subglottic secretion drainage"],r:"Subglottic secretion drainage (continuous or intermittent) prevents the pooling and aspiration of secretions that accumulate above the ETT cuff — a primary mechanism of VAP."},
{s:"An ICU nurse observes a colleague changing the ventilator circuit every 12 hours. The correct charge nurse response is:",o:["Correct — this is evidence-based VAP prevention","Unnecessary; circuits should only be changed when visibly soiled","Fine, but HOB should be elevated first","The nurse should also suction on a fixed schedule"],c:["Unnecessary; circuits should only be changed when visibly soiled"],r:"Scheduled ventilator circuit changes are NOT evidence-based. They may actually increase VAP risk by introducing microorganisms. Change circuits only when visibly contaminated."},
{s:"Why is head-of-bed elevation to 30–45 degrees a core VAP prevention measure?",o:["It improves the client's view of the room","It reduces gastric reflux and aspiration of secretions into the airway","It increases sedation requirements","It prevents pressure injuries only"],c:["It reduces gastric reflux and aspiration of secretions into the airway"],r:"Keeping the head of the bed elevated uses gravity to reduce reflux of gastric contents and pooling of oropharyngeal secretions that can be aspirated past the ETT cuff — the main route to VAP. The mechanism is the concept tested."},
{s:"What is the rationale for a daily sedation interruption ('sedation vacation') in the VAP bundle?",o:["It allows the family to visit","It reduces cumulative sedation, shortens ventilator days, and lowers VAP risk","It permits routine circuit changes","It increases the dose of sedatives needed"],c:["It reduces cumulative sedation, shortens ventilator days, and lowers VAP risk"],r:"Interrupting sedation daily lets the team assess readiness to wean, reduces total time on the ventilator, and thereby lowers VAP risk. Fewer ventilator days means fewer chances for ventilator-associated infection."}
]},
{group:"Ventilator Alarms",qs:[
{s:"High-pressure alarm sounds during repositioning. SpO₂ 95%, client calm, breath sounds clear, kinked tubing visible under the bed rail. Priority action?",o:["Straighten the ventilator tubing","Suction the ETT","Assess for patient biting on the ETT","Disconnect and manually ventilate with BVM"],c:["Straighten the ventilator tubing"],r:"High-pressure alarm + identified mechanical cause (kinked tubing) → straighten the tubing first. Stable SpO₂ and clear breath sounds confirm no acute airway problem. BVM is unnecessary when cause is simple and identified."},
{s:"Low-pressure alarm activates during repositioning. Exhaled tidal volume drops to near zero, peak airway pressure drops. Tubing stretched tightly across the bed rail. First action?",o:["Sweep the circuit and reconnect any disconnection","Increase FiO₂ to 100%","Inflate the ETT cuff to stop a suspected leak","Suction the ETT for secretions"],c:["Sweep the circuit and reconnect any disconnection"],r:"Low-pressure alarm + near-zero exhaled volume + stretched tubing = circuit disconnection. First: sweep the circuit from patient to ventilator and reconnect the disconnection to restore ventilation."},
{s:"Which situation is most likely to trigger a HIGH-pressure alarm in a mechanically ventilated patient?",o:["Cuff deflation or circuit disconnection","Patient biting ETT, secretion buildup, or kinked tubing","Spontaneous breathing exceeding the set rate","ETT displaced above the vocal cords"],c:["Patient biting ETT, secretion buildup, or kinked tubing"],r:"High-pressure alarms = increased resistance to airflow: biting ETT, mucus plugging, kinked tubing, or severe bronchospasm. Low-pressure alarms = loss of circuit integrity (disconnection, cuff leak)."},
{s:"A high-pressure ventilator alarm sounds. SpO₂ is dropping, breath sounds are diminished, and the client cannot be easily cleared. The nurse cannot quickly identify the cause. What is the safest action?",o:["Silence the alarm and continue monitoring","Disconnect from the ventilator and manually ventilate with a BVM at 100% O₂","Increase the set tidal volume","Wait for respiratory therapy to arrive"],c:["Disconnect from the ventilator and manually ventilate with a BVM at 100% O₂"],r:"When the cause of an alarm with deterioration cannot be quickly fixed, the universal rescue is to disconnect and bag the client with 100% O₂ — this both ventilates the patient and isolates whether the problem is the patient or the machine. Never silence an alarm during deterioration."},
{s:"Match the alarm to its likely cause: a client's ventilator shows LOW exhaled tidal volume and LOW peak pressure. The most likely cause is:",o:["Mucus plug or kinked tubing","A leak or disconnection somewhere in the circuit or cuff","Bronchospasm","Biting the endotracheal tube"],c:["A leak or disconnection somewhere in the circuit or cuff"],r:"Low pressure + low exhaled volume means gas is escaping rather than meeting resistance — a leak or disconnection (including a deflated/ruptured cuff). High pressure with maintained volume points to obstruction (plug, kink, biting, bronchospasm). Distinguishing the two alarm patterns is the concept."}
]},
{group:"Brain Death",qs:[
{s:"During a brain death evaluation, which finding is INCONSISTENT with brain death?",o:["No pupillary response to light bilaterally","No doll's eyes movement with head turn","Decerebrate posturing in response to painful stimuli","Apnea with PaCO₂ rising to 65 mmHg during apnea test"],c:["Decerebrate posturing in response to painful stimuli"],r:"Decerebrate posturing requires intact brainstem activity — INCONSISTENT with brain death. Brain death requires complete absence of ALL brainstem reflexes. Deep tendon reflexes (spinal cord–mediated) may persist."},
{s:"A family asks what the apnea test determines. Most accurate response?",o:["It measures whether the heart can maintain rhythm without brain input","It determines if the brain initiates a breath when CO₂ rises to threshold","It confirms absent electrical brain activity on EEG","It checks oculovestibular reflexes using ice water"],c:["It determines if the brain initiates a breath when CO₂ rises to threshold"],r:"The apnea test assesses brainstem respiratory drive. The ventilator is disconnected; if no spontaneous breaths occur when PaCO₂ ≥60 mmHg, respiratory drive is absent — confirming this brain death criterion."},
{s:"Which finding CONFIRMS brain death?",o:["Decerebrate posturing to painful stimuli","Absent corneal and pupillary reflexes bilaterally","Presence of deep tendon reflexes","Spontaneous eye movements"],c:["Absent corneal and pupillary reflexes bilaterally"],r:"Brain death requires absent brainstem reflexes including absent corneal and pupillary reflexes. Decerebrate posturing indicates brainstem activity. Deep tendon and spinal reflexes may persist in brain death."},
{s:"Why can a brain-dead patient still exhibit deep tendon reflexes or spinal movements?",o:["Brain death is not yet complete","These reflexes are mediated by the spinal cord, not the brain","It indicates the patient may recover","The apnea test was performed incorrectly"],c:["These reflexes are mediated by the spinal cord, not the brain"],r:"Spinal reflexes (including some DTRs and the 'Lazarus' sign) are mediated below the brainstem and can persist even when all brain and brainstem function has irreversibly ceased. They do NOT indicate recovery — this distinction is the concept tested."},
{s:"A nurse is supporting a family during a brain death evaluation. Which statement is most accurate and appropriate?",o:["Brain death is reversible with enough time on the ventilator","Brain death means irreversible loss of all brain and brainstem function — it is legally and clinically death","The ventilator is keeping the brain alive","A positive apnea test means the patient is improving"],c:["Brain death means irreversible loss of all brain and brainstem function — it is legally and clinically death"],r:"Brain death is the irreversible cessation of all brain AND brainstem function and is legally equivalent to death. The ventilator supports oxygenation of organs but does not sustain brain function. Honest, accurate communication supports family understanding and any organ donation discussion."}
]},
{group:"Decreased Cardiac Output",qs:[
{s:"A client with decompensated HF has cool extremities, weak pulses, delayed capillary refill, and decreased urine output. Which additional finding is most consistent with decreased cardiac output?",o:["Bounding pulses and hypertension","Warm flushed skin and increased urine output","Confusion, cool extremities, and weak pulses","Bradycardia and elevated CVP"],c:["Confusion, cool extremities, and weak pulses"],r:"Decreased CO = tissue hypoperfusion: cool extremities, weak pulses, confusion (cerebral hypoperfusion), and oliguria. Bounding pulses and warm skin suggest hyperdynamic state (distributive shock), not low output."},
{s:"Post-MI vitals: BP 84/52, HR 124, SpO₂ 88%, cool clammy skin, decreased urine output. Most consistent condition?",o:["Hypertensive emergency","Cardiogenic shock from decreased cardiac output","Volume depletion from hemorrhage","Distributive shock from sepsis"],c:["Cardiogenic shock from decreased cardiac output"],r:"Post-MI hypotension + cool clammy skin + tachycardia + oliguria = cardiogenic shock (pump failure). Sepsis typically presents with warm flushed skin initially. Hemorrhage would involve evident blood loss."},
{s:"A client with dilated cardiomyopathy has BP 90/60, HR 118, cool pale extremities, and UO 15 mL/hr. Which additional finding most supports cardiogenic shock?",o:["SpO₂ 98% with warm extremities","Altered mental status and narrowing pulse pressure","Systolic BP 130 with strong peripheral pulses","Urine output 60 mL/hour"],c:["Altered mental status and narrowing pulse pressure"],r:"Cardiogenic shock hallmarks: hypotension + altered mental status (cerebral hypoperfusion) + cool extremities + oliguria + narrowing pulse pressure (small SBP-DBP gap = poor stroke volume)."},
{s:"Why does decreased cardiac output cause decreased urine output and confusion?",o:["The kidneys and brain are the first organs to fail in all illnesses","Reduced perfusion to the kidneys and brain impairs their function","Increased blood flow overwhelms these organs","Diuretics always cause these findings"],c:["Reduced perfusion to the kidneys and brain impairs their function"],r:"Low cardiac output reduces perfusion to vital organs. The kidneys respond with oliguria and the brain with confusion/altered mentation. Recognizing these as perfusion markers — not isolated problems — is the clinical reasoning being tested."},
{s:"A nurse is monitoring a client at risk for low cardiac output. Which set of findings should prompt the MOST concern?",o:["Warm skin, UO 80 mL/hr, alert and oriented","Cool mottled skin, UO 10 mL/hr, new confusion, weak thready pulses","BP 128/78, HR 76, clear lungs","Pink nail beds with brisk capillary refill"],c:["Cool mottled skin, UO 10 mL/hr, new confusion, weak thready pulses"],r:"The cluster of cool/mottled skin, oliguria, new confusion, and weak pulses indicates failing perfusion across multiple organ systems — the danger pattern of decreasing cardiac output requiring urgent intervention."}
]},
{group:"Cardiomyopathy Types",qs:[
{s:"Which description best distinguishes HCM from dilated cardiomyopathy (DCM)?",o:["HCM = ventricular dilation with low EF","HCM = asymmetric septal hypertrophy with dynamic LVOT obstruction and exertional syncope","HCM = noncompliant ventricles with preserved EF","HCM = fibrofatty myocardial replacement"],c:["HCM = asymmetric septal hypertrophy with dynamic LVOT obstruction and exertional syncope"],r:"HCM = septal hypertrophy + LVOT obstruction + SCD risk. DCM = dilated ventricles + low EF. Restrictive CM = stiff ventricles + preserved EF. ARVC = fibrofatty RV replacement."},
{s:"A client has noncompliant ventricles, preserved ejection fraction, and prominent right-sided congestion (ascites, elevated JVP). Which cardiomyopathy?",o:["Dilated cardiomyopathy","Hypertrophic cardiomyopathy","Restrictive cardiomyopathy","ARVC"],c:["Restrictive cardiomyopathy"],r:"Restrictive cardiomyopathy: stiff, noncompliant ventricles → diastolic failure → preserved EF + right-sided congestion. Causes include amyloidosis and sarcoidosis."},
{s:"A 28-year-old athlete is resuscitated from cardiac arrest. Workup reveals fibrofatty replacement of the right ventricular myocardium. Which cardiomyopathy?",o:["HCM","Dilated cardiomyopathy","ARVC","Restrictive cardiomyopathy"],c:["ARVC"],r:"ARVC (Arrhythmogenic Right Ventricular Cardiomyopathy) = fibrofatty replacement of RV myocardium → ventricular arrhythmias → SCD risk, especially in young athletes."},
{s:"Which cardiomyopathy is characterized by a dilated, weakly contracting ventricle with a markedly reduced ejection fraction?",o:["Hypertrophic cardiomyopathy","Dilated cardiomyopathy","Restrictive cardiomyopathy","ARVC"],c:["Dilated cardiomyopathy"],r:"Dilated cardiomyopathy = enlarged, thin-walled ventricle with poor systolic contraction and low EF → it is the classic cause of systolic HFrEF. Contrast with HCM (thick septum, preserved/high EF) and restrictive (stiff, preserved EF)."},
{s:"What functional problem is shared by hypertrophic and restrictive cardiomyopathies that distinguishes them from dilated cardiomyopathy?",o:["Impaired ventricular FILLING (diastolic dysfunction) with often preserved EF","Severely reduced contractility with low EF","Fibrofatty replacement of the right ventricle","Complete absence of heart sounds"],c:["Impaired ventricular FILLING (diastolic dysfunction) with often preserved EF"],r:"Both HCM (thick, stiff walls) and restrictive CM (rigid walls) primarily impair ventricular filling — diastolic dysfunction — while EF is often preserved. Dilated CM is the opposite: a systolic (contraction) problem with low EF. Grouping by systolic vs. diastolic failure is the concept tested."}
]},
{group:"PAD vs CVI",qs:[
{s:"Which combination most strongly distinguishes PAD from CVI?",o:["Intermittent claudication, pallor on leg elevation, and weak/absent pulses","Swelling, brown ankle discoloration, and venous ulcers near medial malleolus","Burning calf pain worsening with walking and relieved by rest","Redness and warmth with bounding pulses"],c:["Intermittent claudication, pallor on leg elevation, and weak/absent pulses"],r:"PAD: claudication, pallor on leg elevation (arterial insufficiency), absent/weak pulses. CVI: edema, hyperpigmentation, venous ulcers near medial malleolus, normal pulses."},
{s:"Which finding is most associated with CVI rather than PAD?",o:["Absent dorsalis pedis pulses","Pain relieved by dangling legs off the bed","Pitting edema worsening throughout the day and improving with elevation","Claudication at 50 yards of walking"],c:["Pitting edema worsening throughout the day and improving with elevation"],r:"Dependent edema worsening with prolonged standing and improving with elevation = classic CVI. PAD: pain relieved by dangling (gravity increases arterial flow), absent pulses, claudication."},
{s:"A client has a shallow ulcer near the medial malleolus with brownish skin discoloration, moderate drainage, and intact 2+ peripheral pulses. Most consistent diagnosis?",o:["PAD with arterial ulceration","CVI with venous stasis ulcer","Diabetic neuropathic ulcer","Acute deep vein thrombosis"],c:["CVI with venous stasis ulcer"],r:"Venous stasis ulcers: medial malleolus location, shallow/irregular, wet/draining, hyperpigmented skin, INTACT pulses. Arterial ulcers: punched-out, dry, painful, toes/distal foot, ABSENT pulses."},
{s:"Why is leg ELEVATION helpful in CVI but potentially HARMFUL in PAD?",o:["Elevation worsens venous return in both conditions","Elevation drains venous congestion (helps CVI) but reduces arterial inflow (harms PAD)","Elevation has no physiologic basis","Elevation only affects skin temperature"],c:["Elevation drains venous congestion (helps CVI) but reduces arterial inflow (harms PAD)"],r:"In CVI the problem is venous pooling, so elevation drains congestion and reduces edema. In PAD the problem is poor arterial inflow, so elevating the limb fights gravity and worsens ischemia. The opposite positioning logic is the concept tested."},
{s:"An arterial (PAD) ulcer differs from a venous (CVI) ulcer in which way?",o:["Arterial ulcers are wet, shallow, and located at the medial malleolus","Arterial ulcers are dry, punched-out, painful, and located on the toes or distal foot","Arterial ulcers occur only with strong pulses","Arterial ulcers improve with leg elevation"],c:["Arterial ulcers are dry, punched-out, painful, and located on the toes or distal foot"],r:"Arterial ulcers are dry, well-demarcated ('punched-out'), painful, found distally (toes/foot), with diminished pulses. Venous ulcers are moist, irregular, near the medial malleolus, with edema and intact pulses. Matching ulcer characteristics to etiology is the skill."}
]},
{group:"Critical Limb Ischemia",qs:[
{s:"A client with PAD presents with sudden rest pain, pale cool foot, and diminished pedal pulses. Diagnosis: acute critical limb ischemia. Priority intervention?",o:["Initiate IV unfractionated heparin per protocol","Elevate the affected limb above heart level","Apply intermittent pneumatic compression","Begin active range-of-motion exercises"],c:["Initiate IV unfractionated heparin per protocol"],r:"Acute limb ischemia = vascular emergency. IV heparin prevents clot propagation while the limb is assessed for revascularization. Leg elevation REDUCES arterial perfusion — keep limb flat or slightly dependent. Compression and ROM are contraindicated."},
{s:"A client presents with the 6 P's of acute arterial occlusion in the right foot. Immediate priority action?",o:["Elevate the right leg to reduce edema","Notify vascular team and prepare for IV heparin","Apply a warm compress to improve circulation","Begin compression therapy"],c:["Notify vascular team and prepare for IV heparin"],r:"6 P's (pain, pallor, pulselessness, paresthesias, paralysis, poikilothermia) = acute arterial occlusion → immediate vascular consult + anticoagulation. Elevation, heat, and compression are ALL contraindicated."},
{s:"Which nursing intervention is CONTRAINDICATED in a client with acute arterial limb ischemia?",o:["Keeping the affected limb flat or slightly dependent","Elevating the limb above heart level","Preparing for IV heparin infusion","Protecting the limb from pressure and trauma"],c:["Elevating the limb above heart level"],r:"Elevation is contraindicated in arterial ischemia — gravity is needed to maintain the already-compromised arterial blood flow. Elevation worsens ischemia and risks limb loss."},
{s:"What are the classic '6 P's' the nurse assesses for in acute arterial limb occlusion?",o:["Pain, pallor, pulselessness, paresthesia, paralysis, poikilothermia","Pain, pus, pressure, pallor, pyrexia, pulses","Pain, position, pallor, pressure, paralysis, pyrexia","Pulse, pressure, pallor, pain, pyrexia, paresthesia"],c:["Pain, pallor, pulselessness, paresthesia, paralysis, poikilothermia"],r:"The 6 P's of acute arterial occlusion are Pain, Pallor, Pulselessness, Paresthesia, Paralysis, and Poikilothermia (coolness). Paralysis and paresthesia are late, ominous signs suggesting the limb is at high risk — knowing the progression guides urgency."},
{s:"A client with critical limb ischemia asks why the affected leg should be kept level or slightly dependent rather than elevated. Best response?",o:["Elevation increases swelling that causes the pain","Keeping the leg level or dependent uses gravity to help maintain the limited arterial blood flow","Elevation increases the risk of blood clots forming","Position makes no difference in arterial disease"],c:["Keeping the leg level or dependent uses gravity to help maintain the limited arterial blood flow"],r:"In arterial insufficiency, arterial inflow is the limiting factor. A dependent or level position lets gravity assist perfusion to the ischemic tissue, whereas elevation fights gravity and worsens ischemia. This is the reasoning behind the positioning rule."}
]},
{group:"Post-Mortem Care",qs:[
{s:"A 74-year-old with terminal cancer is pronounced dead (expected, non-forensic). Family is at the bedside. Most appropriate nursing action?",o:["Remove all lines and send the body to the morgue immediately","Provide post-mortem care, cleanse the body, and allow the family private time","Leave all devices in place until the medical examiner arrives","Collect personal belongings immediately for distribution"],c:["Provide post-mortem care, cleanse the body, and allow the family private time"],r:"For expected, non-forensic deaths: cleanse the body, close eyes, place dentures, elevate the head, and allow family private time. There is no clinical urgency requiring immediate body transfer."},
{s:"After an expected death, the family wishes to remain with the patient. Most appropriate nursing action?",o:["Ask family to wait outside while tubes are removed","Provide dignified post-mortem care and allow family to remain at the bedside","Transfer the body immediately to the morgue for room turnover","Leave all equipment and await the morgue team before allowing family in"],c:["Provide dignified post-mortem care and allow family to remain at the bedside"],r:"Family-centered post-mortem care supports the grieving process. Cleanse the body, position appropriately, and allow unhurried family time. There is no reason to separate the family from their loved one."},
{s:"After pronouncement of death on the medical unit, which nursing action is NOT appropriate?",o:["Cleansing the body and positioning it with the head slightly elevated","Allowing the family uninterrupted time with the patient","Removing all IV lines and immediately sending the body to the morgue without notifying the family","Placing dentures and gently closing the patient's eyes"],c:["Removing all IV lines and immediately sending the body to the morgue without notifying the family"],r:"Immediately transferring the body to the morgue without giving the family time is a violation of patient dignity and family-centered care. Post-mortem care and family time take priority before transfer."},
{s:"In which situation should the nurse NOT remove tubes and lines during post-mortem care?",o:["An expected death from terminal cancer","A death under investigation by the medical examiner (e.g., trauma or unexplained death)","A hospice patient with a signed DNR","A natural death witnessed by the care team"],c:["A death under investigation by the medical examiner (e.g., trauma or unexplained death)"],r:"When a death is a coroner/medical examiner case (trauma, suspicious, or unexplained), tubes and lines are LEFT IN PLACE as potential evidence. For expected non-forensic deaths, lines are removed during routine post-mortem care. Recognizing forensic cases is the concept tested."},
{s:"Why does the nurse position the body with the head slightly elevated during post-mortem care?",o:["To make transport easier","To prevent blood from pooling and discoloring the face","To assist with rigor mortis","It is required by law"],c:["To prevent blood from pooling and discoloring the face"],r:"Elevating the head shortly after death reduces dependent pooling of blood (livor mortis) in the face, preserving a more natural appearance for the family viewing. Understanding the why behind each post-mortem step is the goal here."}
]},
{group:"Comfort Care & Symptom Mgmt",qs:[
